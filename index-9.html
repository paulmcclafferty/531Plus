// ── REST TIMER ────────────────────────────────────────────────────────────────
function RestTimer({secs,onClose}){
  const[left,setLeft]=useState(secs);
  const[running,setRunning]=useState(true);
  useEffect(()=>{
    if(!running||left<=0)return;
    const t=setTimeout(()=>setLeft(l=>l-1),1000);
    return()=>clearTimeout(t);
  },[left,running]);
  const pct=left/secs;
  const r=38, circ=2*Math.PI*r;
  const done=left<=0;
  return(
    <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:200,background:"#1a1a1a",border:"1px solid var(--border)",borderRadius:12,padding:"14px 20px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 4px 24px rgba(0,0,0,.7)",minWidth:220}}>
      <svg width="44" height="44" viewBox="0 0 88 88">
        <circle cx="44" cy="44" r={r} fill="none" stroke="var(--border)" strokeWidth="6"/>
        <circle cx="44" cy="44" r={r} fill="none" stroke={done?"var(--green)":"var(--gold)"} strokeWidth="6"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
          style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dashoffset .9s linear"}}/>
        <text x="44" y="50" textAnchor="middle" fontSize="18" fontWeight="700" fill={done?"var(--green)":"var(--text)"}>{done?"✓":left}</text>
      </svg>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:13,color:done?"var(--green)":"var(--text)"}}>{done?"Rest complete!":"Rest timer"}</div>
        <div style={{color:"var(--muted)",fontSize:11,marginTop:2}}>{done?"Ready for next set":"seconds remaining"}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        <button style={{...btnStyle("ghost","xs"),fontSize:12}} onClick={()=>setRunning(r=>!r)}>{running?"⏸":"▶"}</button>
        <button style={{...btnStyle("ghost","xs"),fontSize:12}} onClick={onClose}>✕</button>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const init=loadState()||DEFAULT_STATE;
  const[st,setSt]=useState(init);
  const[showSettings,setShowSettings]=useState(false);
  const[tab,setTab]=useState("home");
  // calc tab local state
  const[calcW,setCalcW]=useState("");
  const[calcR,setCalcR]=useState("");
  const[calcRes,setCalcRes]=useState(null);
  const[bwInp,setBwInp]=useState("");
  const[timer,setTimer]=useState(null); // null | {secs}

  // Persist on every state change
  useEffect(()=>{saveState(st);},[st]);

  function upd(patch){setSt(p=>({...p,...patch}));}
  function updCfg(patch){setSt(p=>({...p,cfg:{...p.cfg,...patch}}));}

  function completeSetup(data){
    setSt(p=>({...p,setupDone:true,cfg:{variant:data.variant,accStyle:data.accStyle,unit:data.unit,deloadEvery7:data.deloadEvery7},tms:data.tms,week:1,day:0,cycle:1,totalWeeks:0,customAcc:data.customAcc||{squat:[],bench:[],deadlift:[],press:[]}}));
  }

  function saveSettings(data,isImport=false){
    if(isImport){setSt({...DEFAULT_STATE,...data});return;}
    if(data._csvImport){
      setSt(p=>({...p,
        setupDone:true,
        cfg:{...p.cfg,variant:data.variant,accStyle:data.accStyle,unit:data.unit,deloadEvery7:data.deloadEvery7,warmup:data.warmup!==false,joker:data.joker||false,restSecs:data.restSecs||180},
        tms:data.tms,
        customAcc:data.customAcc||p.customAcc,
        history:data.history||p.history,
        prs:data.prs||p.prs,
        week:data.week||p.week,
        cycle:data.cycle||p.cycle,
        day:data.day||0,
        totalWeeks:data.totalWeeks||p.totalWeeks,
      }));
      return;
    }
    setSt(p=>({...p,cfg:{variant:data.variant,accStyle:data.accStyle,unit:data.unit,deloadEvery7:data.deloadEvery7,warmup:data.warmup!==false,joker:data.joker||false,restSecs:data.restSecs||180},tms:data.tms,customAcc:data.customAcc||p.customAcc}));
  }

  function advanceWeek(){
    setSt(p=>{
      let{week,cycle,totalWeeks,tms,cfg}=p;
      const newTotal=totalWeeks+1;
      // Auto-deload every 7 weeks
      if(cfg.deloadEvery7&&newTotal%7===0&&week!==4){
        return{...p,week:4,day:0,totalWeeks:newTotal};
      }
      if(week<4){return{...p,week:week+1,day:0,totalWeeks:newTotal};}
      // End of cycle — bump TMs
      const nt={...tms};
      LIFTS.forEach(l=>{if(nt[l])nt[l]=r5(nt[l]+(l==="squat"||l==="deadlift"?5:2.5));});
      return{...p,week:1,day:0,cycle:cycle+1,tms:nt,totalWeeks:newTotal};
    });
  }

  function goBack(){
    setSt(p=>{
      let{week,cycle,day,totalWeeks}=p;
      if(day>0) return{...p,day:day-1};
      if(week>1) return{...p,week:week-1,day:3};
      if(cycle>1) return{...p,week:4,cycle:cycle-1,day:3};
      return p;
    });
  }

  function logWorkout(){
    const lift=LIFTS[st.day];
    const tm=st.tms[lift]||0;
    const ms=mainSets(st.cfg.variant,st.week);
    const topSet=ms[ms.length-1];
    const topWt=r5(tm*topSet.pct);
    const ak=`w${st.week}d${st.day}s${ms.length-1}`;
    const ar=parseInt(st.amraps[ak])||0;
    const est=ar>0?epley(topWt,ar):null;
    if(est){
      setSt(p=>({...p,prs:{...p.prs,[lift]:[...(p.prs[lift]||[]),{cycle:p.cycle,week:p.week,est,date:new Date().toLocaleDateString()}]}}));
    }
    const entry={id:Date.now(),date:new Date().toLocaleDateString(),cycle:st.cycle,week:st.week,day:st.day,lift:LIFT_LABELS[lift],topSet:toDisp(topWt,st.cfg.unit)+toLbl(st.cfg.unit),amrap:ar||"—",notes:st.notes[`w${st.week}d${st.day}`]||""};
    setSt(p=>({...p,history:[entry,...p.history]}));
    // Auto-advance day
    if(st.day<3) setSt(p=>({...p,day:p.day+1}));
  }

  function logBW(){
    const v=parseFloat(bwInp);if(isNaN(v)||v<=0)return;
    setSt(p=>({...p,bwLog:[...p.bwLog,{date:new Date().toLocaleDateString(),w:v}]}));
    setBwInp("");
  }

  const lift=LIFTS[st.day];
  const tm=st.tms[lift]||0;
  const ms=mainSets(st.cfg.variant,st.week);
  const bo=backoff(st.cfg.variant,st.week,tm);
  const wodIdx=(st.cycle-1)%3;
  const wod=(WODS[lift]&&WODS[lift][wodIdx]);
  const sk=`w${st.week}d${st.day}`;
  const curScale=st.wodScale[sk]||"rx";
  const dispTM=tm?toDisp(tm,st.cfg.unit):0;
  const varLabel=(VARIANTS.find(v=>v.id===st.cfg.variant)||{name:""}).name;

  function setCheck(k,v){
    setSt(p=>({...p,checks:{...p.checks,[k]:v}}));
    // Start rest timer when a set is ticked done
    if(v && k.includes("_done")) setTimer({secs:st.cfg.restSecs||180});
  }
  function setNote(k,v){setSt(p=>({...p,notes:{...p.notes,[k]:v}}));}
  function setAmrap(k,v){setSt(p=>({...p,amraps:{...p.amraps,[k]:v}}));}
  function setWodScale(k,v){setSt(p=>({...p,wodScale:{...p.wodScale,[k]:v}}));}
  function setExHistory(fn){setSt(p=>({...p,exHistory:fn(p.exHistory)}));}

  if(!st.setupDone) return <Wizard onComplete={completeSetup}/>;

  const TABS=[["home","Home"],["workout","Workout"],["calc","1RM Calc"],["progress","Progress"],["history","History"]];

  // Next workout info
  const nextLift=LIFT_LABELS[DAY_LIFTS[st.day]];
  const nextTM=st.tms[DAY_LIFTS[st.day]]||0;
  const nextWave=mainSets(st.cfg.variant,st.week);
  const nextTopSet=nextTM?r5(nextTM*nextWave[nextWave.length-1].pct):0;
  const lastEntry=st.history[0]||null;
  const daysSinceLastWorkout=lastEntry?Math.floor((Date.now()-new Date(lastEntry.date).getTime())/(1000*60*60*24)):null;

  return(
    <div style={{background:"#0a0a0a",minHeight:"100vh",color:"var(--text)",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif",fontSize:15}}>
      {showSettings&&<Settings cfg={st.cfg} tms={st.tms} onSave={saveSettings} onClose={()=>setShowSettings(false)} appState={st}/>}
      {timer&&<RestTimer secs={timer.secs} onClose={()=>setTimer(null)}/>}

      {/* HEADER */}
      <div style={{background:"var(--panel)",borderBottom:"2px solid var(--gold)",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,gap:8}}>
        <div style={{fontWeight:900,fontSize:20,letterSpacing:1,color:"#fff"}}>531<span style={{color:"var(--gold)"}}>+</span></div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{background:"var(--gold)",color:"#000",fontWeight:700,fontSize:10,padding:"3px 8px",letterSpacing:1,borderRadius:2}}>C{st.cycle}·W{st.week}</div>
          <button style={{...btnStyle("ghost","sm"),padding:"5px 9px",fontSize:13,lineHeight:1,color:"var(--gold)",borderColor:"var(--gold)"}} onClick={()=>{
            setTab("workout");
            setTimeout(()=>{
              const el=document.getElementById("currentDay");
              if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.style.outline="2px solid var(--gold)";setTimeout(()=>el.style.outline="none",1200);}
            },100);
          }} title="Go to current workout">▶▶</button>
          <button style={{...btnStyle("ghost","sm"),padding:"5px 9px",fontSize:15,lineHeight:1}} onClick={()=>setShowSettings(true)} title="Settings">⚙</button>
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",background:"var(--panel)",borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {TABS.map(([id,label])=><button key={id} style={{fontWeight:700,fontSize:11,letterSpacing:1.5,padding:"10px 14px",cursor:"pointer",border:"none",borderBottom:tab===id?"2px solid var(--gold)":"2px solid transparent",background:"none",color:tab===id?"var(--gold)":"var(--muted)",textTransform:"uppercase",whiteSpace:"nowrap"}} onClick={()=>setTab(id)}>{label}</button>)}
      </div>

      <div style={{padding:12,maxWidth:820,margin:"0 auto"}}>

        {/* ── HOME / DASHBOARD ── */}
        {tab==="home"&&<>
          {/* Next workout hero card */}
          <div style={{background:"linear-gradient(135deg,#1a1a1a 0%,#111 100%)",border:"1px solid var(--gold)",borderRadius:6,padding:20,marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"var(--gold)",marginBottom:6}}>Next Workout</div>
            <div style={{fontWeight:900,fontSize:28,color:"#fff",marginBottom:2}}>{nextLift}</div>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:16}}>
              Cycle {st.cycle} · Week {st.week}{st.week===4?" (Deload)":""} · {DAY_LABELS[st.day]}
            </div>
            {nextTM>0&&<div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
              {nextWave.map((set,i)=>{
                const wt=toDisp(r5(nextTM*set.pct),st.cfg.unit);
                const isAmrap=typeof set.reps==="string";
                return<div key={i} style={{background:"rgba(201,168,76,0.1)",border:`1px solid ${isAmrap?"var(--gold)":"var(--border)"}`,borderRadius:4,padding:"8px 12px",textAlign:"center",flex:"1",minWidth:60}}>
                  <div style={{fontWeight:900,fontSize:18,color:isAmrap?"var(--gold)":"var(--text)"}}>{wt}</div>
                  <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>{toLbl(st.cfg.unit)}</div>
                  <div style={{fontSize:10,color:isAmrap?"var(--gold)":"var(--muted)",fontWeight:700,marginTop:1}}>{set.reps}</div>
                </div>;
              })}
            </div>}
            <button style={{...btnStyle("gold"),width:"100%",justifyContent:"center",fontSize:14,padding:"13px",letterSpacing:2}} onClick={()=>{
              setTab("workout");
              setTimeout(()=>{
                const el=document.getElementById("currentDay");
                if(el){el.scrollIntoView({behavior:"smooth",block:"center"});}
              },100);
            }}>▶ START WORKOUT</button>
          </div>

          {/* Stats row */}
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            {[
              {n:st.cycle,     l:"Cycle"},
              {n:st.week,      l:"Week"},
              {n:st.totalWeeks,l:"Total Wks"},
              {n:st.history.length, l:"Sessions"},
            ].map(({n,l})=><div key={l} style={{background:"var(--card)",border:"1px solid var(--border)",padding:"11px 8px",textAlign:"center",flex:"1 1 60px",borderRadius:4}}>
              <div style={{fontWeight:900,fontSize:22,color:"var(--gold)",lineHeight:1}}>{n}</div>
              <div style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginTop:3}}>{l}</div>
            </div>)}
          </div>

          {/* Current TMs */}
          <div style={{...cardStyle(),marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:12,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,color:"var(--text)"}}>Training Maxes</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {LIFTS.map(l=>{
                const tm=st.tms[l];
                const latestPR=(st.prs[l]||[]).slice(-1)[0];
                return<div key={l} style={{background:"#0d0d0d",border:`1px solid ${l===DAY_LIFTS[st.day]?"var(--gold)":"var(--border)"}`,borderRadius:4,padding:"10px 12px"}}>
                  <div style={{fontSize:10,color:l===DAY_LIFTS[st.day]?"var(--gold)":"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>{LIFT_LABELS[l]}{l===DAY_LIFTS[st.day]?" ← today":""}</div>
                  <div style={{fontWeight:900,fontSize:20,color:"var(--text)"}}>{tm?toDisp(tm,st.cfg.unit):"—"}<span style={{fontSize:11,color:"var(--muted)",marginLeft:3}}>{toLbl(st.cfg.unit)} TM</span></div>
                  {latestPR&&<div style={{fontSize:10,color:"var(--green)",marginTop:3}}>Est 1RM: ~{toDisp(latestPR.est,st.cfg.unit)}{toLbl(st.cfg.unit)}</div>}
                </div>;
              })}
            </div>
          </div>

          {/* Last workout */}
          {lastEntry&&<div style={cardStyle()}>
            <div style={{fontWeight:700,fontSize:12,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,color:"var(--text)"}}>Last Workout</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
              <div style={{fontWeight:700,fontSize:16}}>{lastEntry.lift}</div>
              <div style={{fontSize:11,color:"var(--muted)"}}>{lastEntry.date}{daysSinceLastWorkout!==null&&daysSinceLastWorkout>=0?` · ${daysSinceLastWorkout===0?"today":daysSinceLastWorkout===1?"yesterday":`${daysSinceLastWorkout}d ago`}`:""}
              </div>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <div><div style={{fontSize:10,color:"var(--muted)"}}>Top Set</div><div style={{fontWeight:700,color:"var(--gold)"}}>{lastEntry.topSet}</div></div>
              <div><div style={{fontSize:10,color:"var(--muted)"}}>AMRAP</div><div style={{fontWeight:700}}>{lastEntry.amrap}</div></div>
              <div><div style={{fontSize:10,color:"var(--muted)"}}>Cycle/Week</div><div style={{fontWeight:700}}>C{lastEntry.cycle} W{lastEntry.week}</div></div>
            </div>
            {lastEntry.notes&&<div style={{marginTop:8,fontSize:12,color:"var(--muted)",fontStyle:"italic",borderTop:"1px solid var(--border)",paddingTop:8}}>"{lastEntry.notes}"</div>}
          </div>}

          {/* Quick links */}
          <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}}>
            {[["calc","1RM Calc"],["progress","Progress"],["history","History"]].map(([id,label])=>
              <button key={id} style={{...btnStyle("ghost","sm"),flex:"1",justifyContent:"center",padding:"10px"}} onClick={()=>setTab(id)}>{label} →</button>
            )}
          </div>
        </>}

        {/* ── WORKOUT TAB ── */}
        {tab==="workout"&&<>
          {/* Week/Day nav */}
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}>
            <button style={btnStyle("ghost","sm")} onClick={goBack}>← Back</button>
            {[1,2,3,4].map(w=><button key={w} style={selBtnStyle(st.week===w)} onClick={()=>setSt(p=>({...p,week:w,day:0}))}>{w===4?"DL":("Wk"+w)}</button>)}
            <button style={{...selBtnStyle(false),color:"var(--green)",borderColor:"var(--green)",marginLeft:"auto"}} onClick={advanceWeek}>Advance →</button>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
            {DAY_LABELS.map((d,i)=><button key={i} id={st.day===i?"currentDay":undefined} style={selBtnStyle(st.day===i)} onClick={()=>setSt(p=>({...p,day:i}))}>{d}</button>)}
          </div>

          {!tm?<div style={cardStyle()}><p style={{color:"var(--muted)",textAlign:"center",padding:20,fontSize:13}}>Open ⚙ to set training maxes.</p></div>:<>

            {/* CF PRE-LIFT (Jumps) — shown BEFORE main lift */}
            {st.cfg.accStyle==="crossfit"&&<div style={cardStyle()}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                Jumps <span style={tagStyle()}>PRE-LIFT</span>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <div><div style={{fontWeight:600,fontSize:14}}>{CF_ACC[lift].jumps.name}</div><div style={{color:"var(--muted)",fontSize:12,marginTop:3}}>{CF_ACC[lift].jumps.detail}</div></div>
                <div style={circleStyle(!!st.checks[`${sk}_jump_pre`])} onClick={()=>setCheck(`${sk}_jump_pre`,!st.checks[`${sk}_jump_pre`])}>✓</div>
              </div>
              <ExNotes exKey={`${sk}_jumps`} label={CF_ACC[lift].jumps.name} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory}/>
            </div>}

            {/* MAIN LIFT CARD */}
            <div style={cardStyle()}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                {LIFT_LABELS[lift]} — Wk{st.week}{st.week===4?" (Deload)":""}
                <span style={tagStyle()}>TM: {dispTM}{toLbl(st.cfg.unit)}</span>
                <span style={tagStyle("var(--purple)")}>{varLabel}</span>
              </div>
              {st.cfg.warmup!==false&&<div style={{marginBottom:12,paddingBottom:12,borderBottom:"1px solid var(--border)"}}>
                <div style={{fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Warm-up Sets</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {warmupSets(tm).map((wu,i)=>{
                    const dw=toDisp(wu.wt,st.cfg.unit);
                    const wuKey=`${sk}_wu${i}`,done=!!st.checks[wuKey];
                    return<div key={i} onClick={()=>setCheck(wuKey,!done)} style={{background:done?"rgba(39,174,96,.15)":"#0d0d0d",border:`1px solid ${done?"var(--green)":"var(--border)"}`,padding:"8px 10px",borderRadius:3,textAlign:"center",minWidth:62,cursor:"pointer",flex:"1",transition:"all .15s",opacity:done?.6:1}}>
                      <div style={{fontWeight:700,fontSize:16,color:done?"var(--green)":"var(--text)"}}>{dw}</div>
                      <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>{toLbl(st.cfg.unit)} × {wu.reps}</div>
                      <div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>{Math.round(wu.pct*100)}%</div>
                      {done&&<div style={{fontSize:10,color:"var(--green)",marginTop:2}}>✓</div>}
                    </div>;
                  })}
                </div>
              </div>}

              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:260}}>
                  <thead><tr>{["Set","Weight","Target","✓"].map(h=><th key={h} style={{textAlign:"left",padding:"4px 8px",fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {ms.map((set,si)=>{
                      const wt=r5(tm*set.pct);
                      const dw=toDisp(wt,st.cfg.unit);
                      const isAmrap=typeof set.reps==="string";
                      const setKey=`w${st.week}d${st.day}s${si}`;
                      const done=!!st.checks[`${setKey}_done`];
                      return<tr key={si} style={{borderBottom:"1px solid var(--border)",opacity:done?0.4:1,transition:"opacity .2s"}}>
                        <td style={{padding:"9px 8px",fontWeight:700,fontSize:12}}>SET {si+1}</td>
                        <td style={{padding:"9px 8px"}}>
                          <span style={{fontWeight:900,fontSize:20,color:"var(--gold)"}}>{dw}</span>
                          <span style={{color:"var(--muted)",fontSize:11,marginLeft:3}}>{toLbl(st.cfg.unit)} · {Math.round(set.pct*100)}%</span>
                        </td>
                        <td style={{padding:"9px 8px"}}>
                          {isAmrap?<div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{color:"var(--red)",fontWeight:700,fontSize:13}}>{set.reps}</span>
                            <input style={{width:58,background:"#0d0d0d",border:"1.5px solid var(--red)",color:"var(--red)",padding:"4px 6px",fontSize:14,fontWeight:700,textAlign:"center",outline:"none",borderRadius:2,fontFamily:"inherit"}}
                              type="number" inputMode="numeric" placeholder="reps"
                              value={st.amraps[setKey]||""} onChange={e=>setAmrap(setKey,e.target.value)}/>
                          </div>:`${set.reps} reps`}
                        </td>
                        <td style={{padding:"9px 8px"}}>
                          <div style={circleStyle(done)} onClick={()=>setCheck(`${setKey}_done`,!done)}>✓</div>
                        </td>
                      </tr>;
                    })}
                  </tbody>
                </table>
              </div>

              {/* Back-off sets */}
              {bo.length>0&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
                <div style={{fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>{bo[0].label}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {bo.map((set,i)=>{
                    const wt=r5(tm*set.pct),dw=toDisp(wt,st.cfg.unit);
                    const boKey=`${sk}_bo${i}`,done=!!st.checks[boKey];
                    return<div key={i} onClick={()=>setCheck(boKey,!done)} style={{background:done?"rgba(39,174,96,.15)":"#0d0d0d",border:`1px solid ${done?"var(--green)":"var(--border)"}`,padding:"7px 10px",borderRadius:3,textAlign:"center",minWidth:58,cursor:"pointer",transition:"all .15s",opacity:done?.6:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:done?"var(--green)":"var(--gold)"}}>{dw}</div>
                      <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>{toLbl(st.cfg.unit)}×{set.reps}</div>
                      {done&&<div style={{fontSize:10,color:"var(--green)",marginTop:2}}>✓</div>}
                    </div>;
                  })}
                </div>
              </div>}

              {/* Joker sets */}
              {st.cfg.joker&&(()=>{
                const topSet=ms[ms.length-1];
                const jCount=st.jokerCounts[sk]||0;
                const jokers=jokerSets(tm,topSet.pct,jCount);
                return<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{fontSize:9,color:"var(--purple)",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Joker Sets</div>
                    <div style={{display:"flex",gap:5}}>
                      <button style={{...btnStyle("ghost","xs"),color:"var(--purple)",borderColor:"var(--purple)"}} onClick={()=>setSt(p=>({...p,jokerCounts:{...p.jokerCounts,[sk]:(p.jokerCounts[sk]||0)+1}}))}>+ Add Joker</button>
                      {jCount>0&&<button style={btnStyle("ghost","xs")} onClick={()=>setSt(p=>({...p,jokerCounts:{...p.jokerCounts,[sk]:p.jokerCounts[sk]-1}}))}>- Remove</button>}
                    </div>
                  </div>
                  {jokers.map((j,i)=>{
                    const dw=toDisp(j.wt,st.cfg.unit);
                    const jKey=`${sk}_joker${i}`,done=!!st.checks[jKey];
                    return<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<jokers.length-1?"1px solid var(--border)":"none",opacity:done?.5:1}}>
                      <div style={{flex:1}}>
                        <span style={{fontWeight:700,fontSize:16,color:"var(--purple)"}}>{dw}</span>
                        <span style={{color:"var(--muted)",fontSize:11,marginLeft:4}}>{toLbl(st.cfg.unit)} · {Math.round(j.pct*100)}% · {j.reps} reps</span>
                      </div>
                      <div style={circleStyle(done,"var(--purple)")} onClick={()=>setCheck(jKey,!done)}>✓</div>
                    </div>;
                  })}
                  {jCount===0&&<div style={{color:"var(--muted)",fontSize:12}}>Tap "+ Add Joker" to add sets at {Math.round((ms[ms.length-1].pct+0.05)*100)}%+</div>}
                </div>;
              })()}

              <ExNotes exKey={`${sk}_mainlift`} label={LIFT_LABELS[lift]} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory} placeholder="Weight used, feel, PRs..."/>
            </div>

            {/* CF ACCESSORIES — post-lift: sprints + WOD */}
            {st.cfg.accStyle==="crossfit"&&<>
              {/* Sprints */}
              <div style={cardStyle()}>
                <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                  Sprints <span style={tagStyle()}>POST-LIFT</span>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                  <div><div style={{fontWeight:600,fontSize:14}}>{CF_ACC[lift].sprints.name}</div><div style={{color:"var(--muted)",fontSize:12,marginTop:3}}>{CF_ACC[lift].sprints.detail}</div></div>
                  <div style={circleStyle(!!st.checks[`${sk}_sprint`])} onClick={()=>setCheck(`${sk}_sprint`,!st.checks[`${sk}_sprint`])}>✓</div>
                </div>
                <ExNotes exKey={`${sk}_sprints`} label={CF_ACC[lift].sprints.name} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory}/>
              </div>
              {/* WOD */}
              {wod&&<div style={cardStyle()}>
                <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  WOD <span style={tagStyle()}>CONDITIONING</span>
                  <span style={{...tagStyle("var(--muted)"),marginLeft:"auto"}}>{wod.name} · C{st.cycle}</span>
                </div>
                <div style={{display:"flex",gap:6,marginBottom:10}}>
                  {[["rx","Rx","var(--gold)"],["scaled","Scaled","var(--blue)"],["begin","Beginner","var(--green)"]].map(([k,lbl,col])=>
                    <button key={k} style={selBtnStyle(curScale===k,col)} onClick={()=>setWodScale(sk,k)}>{lbl}</button>)}
                </div>
                <div style={{background:"#0d0d0d",border:"1px solid var(--border)",padding:"9px 11px",borderRadius:3,fontSize:13,lineHeight:1.8,color:"var(--text)",marginBottom:8}}>{wod[curScale]}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end"}}>
                  <div style={circleStyle(!!st.checks[`${sk}_wod`])} onClick={()=>setCheck(`${sk}_wod`,!st.checks[`${sk}_wod`])}>✓</div>
                </div>
                <ExNotes exKey={`${sk}_wod`} label={wod.name} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory} placeholder="Time, rounds, load, scale..."/>
              </div>}
            </>}

            {/* WENDLER ACCESSORIES */}
            {st.cfg.accStyle==="wendler"&&<div style={cardStyle()}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>Accessories <span style={tagStyle()}>WENDLER</span></div>
              {WENDLER_ACC[lift].map((acc,i)=>{
                const ck=`${sk}_acc${i}`;
                return<div key={i} style={{paddingBottom:10,marginBottom:10,borderBottom:i<WENDLER_ACC[lift].length-1?"1px solid var(--border)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{acc.name} <span style={{color:"var(--muted)",fontWeight:400,fontSize:12}}>{acc.sets}</span></div>
                      {acc.note&&<div style={{color:"var(--muted)",fontSize:12,marginTop:2}}>{acc.note}</div>}
                    </div>
                    <div style={circleStyle(!!st.checks[ck])} onClick={()=>setCheck(ck,!st.checks[ck])}>✓</div>
                  </div>
                  <ExNotes exKey={`${sk}_wacc${i}`} label={acc.name} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory}/>
                </div>;
              })}
            </div>}

            {/* CUSTOM ACCESSORIES */}
            {st.cfg.accStyle==="custom"&&st.customAcc[lift]&&st.customAcc[lift].length>0&&<div style={cardStyle()}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>Accessories <span style={tagStyle("var(--blue)")}>CUSTOM</span></div>
              {st.customAcc[lift].map((ex,i)=>{
                const ck=`${sk}_cust${i}`;
                return<div key={i} style={{paddingBottom:10,marginBottom:10,borderBottom:i<st.customAcc[lift].length-1?"1px solid var(--border)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                    <div style={{fontWeight:600,fontSize:14}}>{ex}</div>
                    <div style={circleStyle(!!st.checks[ck])} onClick={()=>setCheck(ck,!st.checks[ck])}>✓</div>
                  </div>
                  <ExNotes exKey={`${sk}_cust${i}`} label={ex} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory}/>
                </div>;
              })}
            </div>}

            <div style={{display:"flex",justifyContent:"flex-end",marginTop:4,gap:8}}>
              <button style={btnStyle("green")} onClick={logWorkout}>✓ Log + Next Day</button>
            </div>
          </>}
        </>}

        {/* ── 1RM CALC TAB ── */}
        {tab==="calc"&&<>
          <div style={cardStyle()}>
            <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>1RM Calculator</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><label style={labelStyle()}>Weight ({toLbl(st.cfg.unit)})</label><input style={inputStyle()} type="number" inputMode="decimal" placeholder="e.g. 100" value={calcW} onChange={e=>setCalcW(e.target.value)}/></div>
              <div><label style={labelStyle()}>Reps Done</label><input style={inputStyle()} type="number" inputMode="numeric" placeholder="e.g. 5" value={calcR} onChange={e=>setCalcR(e.target.value)}/></div>
            </div>
            <button style={btnStyle("gold")} onClick={()=>{const w=parseFloat(calcW),r=parseInt(calcR);if(!isNaN(w)&&!isNaN(r)&&r>0)setCalcRes({epley:epley(w,r),brzycki:r===1?w:Math.round(w/(1.0278-.0278*r)),lander:Math.round(100*w/(101.3-2.67123*r))});}}>Calculate</button>
            {calcRes&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
              <div style={{fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Estimated 1RM</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[["Epley",calcRes.epley],["Brzycki",calcRes.brzycki],["Lander",calcRes.lander]].map(([n,v])=>
                  <div key={n} style={{background:"#0d0d0d",border:"1px solid var(--border)",padding:"10px 8px",textAlign:"center",flex:"1 1 60px",borderRadius:3}}>
                    <div style={{fontWeight:900,fontSize:22,color:"var(--gold)",lineHeight:1}}>{v}</div>
                    <div style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginTop:3}}>{n}</div>
                  </div>)}
              </div>
              <div style={{color:"var(--muted)",fontSize:12,marginTop:10}}>Suggested TM (90%): <span style={{color:"var(--gold)",fontWeight:700}}>{r5(calcRes.epley*.9)}{toLbl(st.cfg.unit)}</span></div>
            </div>}
          </div>

          <div style={cardStyle()}>
            <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>Bodyweight</div>
            <div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:12}}>
              <div style={{flex:1}}><label style={labelStyle()}>Weight ({toLbl(st.cfg.unit)})</label><input style={inputStyle()} type="number" inputMode="decimal" placeholder="e.g. 88.5" value={bwInp} onChange={e=>setBwInp(e.target.value)}/></div>
              <button style={btnStyle("gold")} onClick={logBW}>Log</button>
            </div>
            {st.bwLog.length>0&&<>
              <Chart series={[{label:"Bodyweight",color:"var(--green)",data:st.bwLog.map(b=>({x:b.date.slice(0,5),y:b.w}))}]} unit={toLbl(st.cfg.unit)}/>
              <div style={{color:"var(--muted)",fontSize:12,marginTop:6,textAlign:"right"}}>
                Latest: <span style={{color:"var(--green)",fontWeight:700}}>{st.bwLog[st.bwLog.length-1].w}{toLbl(st.cfg.unit)}</span>
                {st.bwLog.length>1&&<span style={{marginLeft:8}}>{st.bwLog[st.bwLog.length-1].w>st.bwLog[0].w?"▲":"▼"}{Math.abs(st.bwLog[st.bwLog.length-1].w-st.bwLog[0].w).toFixed(1)} total</span>}
              </div>
            </>}
          </div>
        </>}

        {/* ── PROGRESS TAB ── */}
        {tab==="progress"&&<>
          {/* Cycle overview — Target vs Actual like Sarasoft */}
          {st.history.length>0&&(()=>{
            // Group PRs by cycle
            const cycles={};
            LIFTS.forEach(l=>{
              (st.prs[l]||[]).forEach(p=>{
                if(!cycles[p.cycle])cycles[p.cycle]={};
                if(!cycles[p.cycle][l]||p.est>cycles[p.cycle][l].actual)
                  cycles[p.cycle][l]={target:toDisp(st.tms[l]||0,st.cfg.unit),actual:toDisp(p.est,st.cfg.unit)};
              });
            });
            // Also add cycles from history that have no PRs
            st.history.forEach(h=>{if(!cycles[h.cycle])cycles[h.cycle]={};});
            const cNums=Object.keys(cycles).sort((a,b)=>b-a).slice(0,6);
            if(!cNums.length) return null;
            return<div style={{marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:8,color:"var(--text)"}}>Cycle Overview</div>
              {cNums.map(cn=>{
                const cData=cycles[cn];
                const startDate=st.history.filter(h=>h.cycle==cn).map(h=>h.date).slice(-1)[0]||"";
                const endDate=st.history.filter(h=>h.cycle==cn).map(h=>h.date)[0]||"";
                return<div key={cn} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:4,padding:"11px 12px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                    <div style={{fontWeight:700,fontSize:13}}>Cycle #{cn}</div>
                    <div style={{fontSize:10,color:"var(--muted)"}}>{startDate}{endDate&&endDate!==startDate?` → ${endDate}`:""}</div>
                  </div>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr>
                      <td style={{fontSize:9,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,paddingBottom:5}}>1RM</td>
                      {LIFTS.map(l=><td key={l} style={{fontSize:9,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,paddingBottom:5,textAlign:"center"}}>{LIFT_LABELS[l]}</td>)}
                    </tr></thead>
                    <tbody>
                      <tr>
                        <td style={{fontSize:11,color:"var(--muted)",paddingBottom:3}}>Target</td>
                        {LIFTS.map(l=><td key={l} style={{textAlign:"center",fontWeight:600,fontSize:14,paddingBottom:3}}>{(cData[l]&&cData[l].target)||toDisp(st.tms[l]||0,st.cfg.unit)||"—"}</td>)}
                      </tr>
                      <tr>
                        <td style={{fontSize:11,color:"var(--muted)"}}>Actual</td>
                        {LIFTS.map(l=>{
                          const t=(cData[l]&&cData[l].target)||0,a=(cData[l]&&cData[l].actual)||0;
                          const col=!a?"var(--muted)":a>=t?"var(--green)":"var(--red)";
                          return<td key={l} style={{textAlign:"center",fontWeight:700,fontSize:15,color:col}}>{a||"—"}</td>;
                        })}
                      </tr>
                    </tbody>
                  </table>
                </div>;
              })}
            </div>;
          })()}

          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
            {[{n:st.cycle,l:"Cycle"},{n:st.week,l:"Week"},{n:st.history.length,l:"Workouts"},{n:st.totalWeeks,l:"Total Wks"}].map(({n,l})=>
              <div key={l} style={{background:"#0d0d0d",border:"1px solid var(--border)",padding:"11px 8px",textAlign:"center",flex:"1 1 65px",borderRadius:3}}>
                <div style={{fontWeight:900,fontSize:24,color:"var(--gold)",lineHeight:1}}>{n}</div>
                <div style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginTop:3}}>{l}</div>
              </div>)}
          </div>

          <div style={cardStyle()}>
            <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              Est. 1RM Progress <span style={tagStyle()}>All Lifts</span>
              {st.bwLog.length>0&&<span style={tagStyle("var(--green)")}>+ Bodyweight</span>}
            </div>
            <Chart unit={toLbl(st.cfg.unit)} series={[
              {label:"Squat",    color:"#c9a84c",data:(st.prs.squat||[]).map(p=>({x:`C${p.cycle}W${p.week}`,y:toDisp(p.est,st.cfg.unit)}))},
              {label:"Bench",    color:"#2980b9",data:(st.prs.bench||[]).map(p=>({x:`C${p.cycle}W${p.week}`,y:toDisp(p.est,st.cfg.unit)}))},
              {label:"Deadlift", color:"#c0392b",data:(st.prs.deadlift||[]).map(p=>({x:`C${p.cycle}W${p.week}`,y:toDisp(p.est,st.cfg.unit)}))},
              {label:"OHP",      color:"#8e44ad",data:(st.prs.press||[]).map(p=>({x:`C${p.cycle}W${p.week}`,y:toDisp(p.est,st.cfg.unit)}))},
              ...(st.bwLog.length>0?[{label:"Bodyweight",color:"#27ae60",data:st.bwLog.map(b=>({x:b.date.slice(0,5),y:b.w}))}]:[]),
            ]}/>
          </div>

          <div style={cardStyle()}>
            <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Current Training Maxes</div>
            {!Object.keys(st.tms).length?<p style={{color:"var(--muted)",textAlign:"center",padding:10,fontSize:13}}>Set maxes in ⚙ Settings</p>:
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {LIFTS.filter(l=>st.tms[l]).map(l=>
                  <div key={l} style={{background:"#0d0d0d",border:"1px solid var(--border)",padding:"10px 8px",textAlign:"center",flex:"1 1 60px",borderRadius:3}}>
                    <div style={{fontWeight:900,fontSize:22,color:"var(--gold)",lineHeight:1}}>{toDisp(st.tms[l],st.cfg.unit)}</div>
                    <div style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginTop:3}}>{LIFT_LABELS[l]} TM</div>
                  </div>)}
              </div>}
          </div>
        </>}

        {/* ── HISTORY TAB ── */}
        {tab==="history"&&<div style={cardStyle()}>
          <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>Workout Log</div>
          {!st.history.length?<p style={{color:"var(--muted)",textAlign:"center",padding:20,fontSize:13}}>No workouts logged yet.</p>:
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:340}}>
                <thead><tr>{["Date","Lift","C/Wk","Top Set","AMRAP","Notes"].map(h=><th key={h} style={{textAlign:"left",padding:"4px 8px",fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {st.history.map(e=><tr key={e.id} style={{borderBottom:"1px solid var(--border)"}}>
                    <td style={{padding:"7px 8px",color:"var(--muted)"}}>{e.date}</td>
                    <td style={{padding:"7px 8px",fontWeight:700}}>{e.lift}</td>
                    <td style={{padding:"7px 8px",color:"var(--muted)"}}>C{e.cycle}W{e.week}</td>
                    <td style={{padding:"7px 8px",color:"var(--gold)",fontWeight:700}}>{e.topSet}</td>
                    <td style={{padding:"7px 8px"}}>{e.amrap}</td>
                    <td style={{padding:"7px 8px",color:"var(--muted)",fontSize:11,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.notes}</td>
                  </tr>)}
                </tbody>
              </table>
            </div>}
        </div>}

      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("app")).render(<App/>);

</script>
<script>
(function() {
  function run() {
    try {
      var src = document.getElementById('jsx-source').textContent;
      var compiled = Babel.transform(src, {
        presets: ['react'],
        filename: 'app.jsx'
      }).code;
      var script = document.createElement('script');
      script.textContent = compiled;
      document.head.appendChild(script);
    } catch(e) {
      var el = document.getElementById('err');
      if(el) {
        el.style.display = 'block';
        el.innerHTML = '<b>Babel Error:</b> ' + e.message + '<br>' + (e.stack||'').slice(0,500);
      }
      console.error('Babel compile error:', e);
    }
  }
  // Wait for Babel to load
  if(typeof Babel !== 'undefined') {
    run();
  } else {
    document.querySelector('script[src*="babel"]').addEventListener('load', run);
  }
})();
</script>


</body>
</html>

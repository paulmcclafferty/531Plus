<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a0a;color:#ddd;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:15px;min-height:100vh;overscroll-behavior:none}
input,textarea,button{font-family:inherit;font-size:inherit}
input[type=number]::-webkit-inner-spin-button{opacity:1}
button{cursor:pointer}
:root{
  --gold:#ffd700;--gold-dim:rgba(255,215,0,0.12);--gold-glow:rgba(255,215,0,0.25);
  --red:#e74c3c;--green:#2ecc71;--blue:#3498db;--purple:#9b59b6;
  --panel:#121212;--card:#1c1c1e;--border:#2c2c2e;
  --muted:#6b6b6e;--text:#e8e8ea;
}
.tab-bar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{font-weight:700;font-size:11px;letter-spacing:1.5px;padding:13px 16px;border:none;border-bottom:3px solid transparent;background:none;color:var(--muted);text-transform:uppercase;white-space:nowrap;cursor:pointer;transition:color .2s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.card{background:var(--card);border:1px solid var(--border);padding:18px;margin-bottom:14px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.btn{font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:12px 20px;border:none;border-radius:10px;cursor:pointer;transition:transform .1s,box-shadow .2s;min-height:44px}
.btn:active{transform:scale(0.97)}
.btn-gold{background:linear-gradient(135deg,#ffd700,#e6c200);color:#000;box-shadow:0 2px 10px var(--gold-glow)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 2px 10px rgba(46,204,113,0.3)}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;color:var(--gold);border:1.5px solid var(--gold)}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-sm{padding:8px 14px;font-size:11px;min-height:36px}
.inp{width:100%;background:#0d0d0d;border:1.5px solid var(--border);color:var(--text);padding:11px 13px;border-radius:10px;font-size:16px;min-height:44px}
.inp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.lbl{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.stat-box{background:#0d0d0d;border:1px solid var(--border);padding:14px 10px;text-align:center;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.stat-num{font-weight:900;font-size:26px;color:var(--gold);line-height:1}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.circle-btn{width:40px;height:40px;border-radius:50%;border:2.5px solid var(--border);background:#0d0d0d;display:inline-flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);cursor:pointer;flex-shrink:0;transition:all .2s;font-weight:900}
.circle-btn.done{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 10px rgba(46,204,113,0.4)}
.sel-btn{font-weight:700;font-size:12px;padding:9px 16px;border:1.5px solid var(--border);background:transparent;color:var(--muted);border-radius:10px;white-space:nowrap;min-height:40px;transition:all .2s}
.sel-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);box-shadow:0 2px 8px var(--gold-glow)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.flex-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.tag{display:inline-block;font-size:10px;padding:3px 8px;background:var(--gold-dim);color:var(--gold);font-weight:700;letter-spacing:1px;border-radius:6px}
textarea{width:100%;background:#0d0d0d;border:1.5px solid var(--border);color:var(--text);padding:10px;border-radius:10px;resize:vertical;font-size:14px}
textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.hero{background:linear-gradient(135deg,#1c1c1e 0%,#0d0d0d 100%);border:1.5px solid var(--gold);border-radius:16px;padding:24px;margin-bottom:14px;box-shadow:0 4px 20px var(--gold-glow)}
.set-row{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border)}
.set-cell{padding:12px 10px}
.wt-num{font-weight:900;font-size:22px;color:var(--gold)}
.amrap-inp{width:70px;background:#0d0d0d;border:1.5px solid var(--red);color:var(--red);padding:7px 9px;font-size:15px;font-weight:700;text-align:center;border-radius:8px;min-height:40px}
.amrap-inp:focus{outline:none}
.section-title{font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.history-notes{margin-top:6px}
.notes-toggle{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:6px 12px;background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;min-height:36px}
.notes-toggle:hover{color:var(--gold);border-color:var(--gold)}
.hist-entry{border-bottom:1px solid var(--border);padding:8px 0}
.hist-date{font-size:10px;color:var(--gold);font-weight:700;margin-bottom:2px}
.hist-text{font-size:13px;line-height:1.5;white-space:pre-wrap}
.variant-card{border:1.5px solid #3a3a3a;background:#1e1e1e;padding:14px 16px;border-radius:12px;cursor:pointer;margin-bottom:10px;transition:all .2s}
.variant-card.selected{border-color:var(--gold);background:var(--gold-dim);box-shadow:0 2px 10px var(--gold-glow)}
.radio{width:16px;height:16px;border-radius:50%;border:2px solid #555;background:transparent;flex-shrink:0}
.radio.selected{border-color:var(--gold);background:var(--gold)}
.warmup-box{background:#0d0d0d;border:1.5px solid var(--border);padding:10px 12px;border-radius:10px;text-align:center;flex:1;cursor:pointer;transition:all .2s;min-height:60px}
.warmup-box.done{background:rgba(46,204,113,.15);border-color:var(--green);box-shadow:0 2px 8px rgba(46,204,113,0.2)}
.backoff-box{background:#0d0d0d;border:1.5px solid var(--border);padding:9px 12px;border-radius:10px;text-align:center;min-width:62px;cursor:pointer;transition:all .2s;min-height:60px}
.backoff-box.done{background:rgba(46,204,113,.15);border-color:var(--green);opacity:.85;box-shadow:0 2px 8px rgba(46,204,113,0.2)}
.timer-overlay{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;background:#1c1c1e;border:1.5px solid var(--border);border-radius:16px;padding:16px 22px;display:flex;align-items:center;gap:16px;box-shadow:0 6px 28px rgba(0,0,0,.7);min-width:240px}
.checkmark{display:inline-block}
</style>

function r5(v){return Math.round(v/2.5)*2.5;}
function r5lb(v){return Math.round(v/5)*5;}
function epley(w,r){return r===1?w:Math.round(w*(1+r/30));}
function toDisp(kg,u){return u==="lbs"?Math.round(kg*2.2046):kg;}
function toLbl(u){return u==="lbs"?"lbs":"kg";}
function fromDisp(v,u){return u==="lbs"?v/2.2046:v;}
function rndW(v,u){return u==="lbs"?r5lb(v):r5(v);}

function ExNotes(p){
  var exKey=p.exKey,label=p.label,notes=p.notes,onNoteChange=p.onNoteChange,exHistory=p.exHistory,setExHistory=p.setExHistory;
  var placeholder=p.placeholder||"Notes, load, feel...";
  var open=useState(false); var setOpen=open[1]; open=open[0];
  var histOpen=useState(false); var setHistOpen=histOpen[1]; histOpen=histOpen[0];
  var entries=(exHistory&&exHistory[label])||[];
  function save(){
    var txt=((notes&&notes[exKey])||"").trim();
    if(!txt)return;
    setExHistory(function(prev){
      var updated=Object.assign({},prev);
      updated[label]=[{date:new Date().toLocaleDateString(),note:txt}].concat(prev[label]||[]);
      return updated;
    });
  }
  return h("div",{style:{marginTop:8}},
    h("div",{className:"flex-row",style:{gap:6}},
      h("button",{className:"notes-toggle",onClick:function(){setOpen(function(o){return !o;})}},
        (open?"Hide":"Show")+" Notes"+(notes&&notes[exKey]?" *":"")),
      entries.length>0&&h("button",{className:"notes-toggle",style:{color:"var(--blue)",borderColor:"var(--blue)"},onClick:function(){setHistOpen(function(o){return !o;})}},
        "History ("+entries.length+")")
    ),
    open&&h("div",{style:{marginTop:6}},
      h("textarea",{rows:2,placeholder:placeholder,value:(notes&&notes[exKey])||"",onChange:function(e){onNoteChange(exKey,e.target.value)}}),
      h("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:4}},
        h("button",{className:"btn btn-green btn-sm",onClick:save},"Save Note"))
    ),
    histOpen&&h("div",{style:{marginTop:6,background:"#0d0d0d",border:"1px solid var(--border)",borderRadius:3,padding:"8px 10px"}},
      h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"var(--muted)",marginBottom:8}},label+" — History"),
      entries.map(function(e,i){
        return h("div",{key:i,className:"hist-entry"},
          h("div",{className:"hist-date"},e.date),
          h("div",{className:"hist-text"},e.note)
        );
      })
    )
  );
}

function RestTimer(p){
  var secs=p.secs,onClose=p.onClose;
  var leftState=useState(secs); var left=leftState[0],setLeft=leftState[1];
  var runState=useState(true); var running=runState[0],setRunning=runState[1];
  useEffect(function(){
    if(!running||left<=0)return;
    var t=setTimeout(function(){setLeft(function(l){return l-1;});},1000);
    return function(){clearTimeout(t);};
  },[left,running]);
  var pct=left/secs;
  var r=38,circ=2*Math.PI*r;
  var done=left<=0;
  return h("div",{className:"timer-overlay"},
    h("svg",{width:44,height:44,viewBox:"0 0 88 88"},
      h("circle",{cx:44,cy:44,r:r,fill:"none",stroke:"var(--border)",strokeWidth:6}),
      h("circle",{cx:44,cy:44,r:r,fill:"none",stroke:done?"var(--green)":"var(--gold)",strokeWidth:6,
        strokeDasharray:circ,strokeDashoffset:circ*(1-pct),strokeLinecap:"round",
        style:{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dashoffset .9s linear"}}),
      h("text",{x:44,y:50,textAnchor:"middle",fontSize:18,fontWeight:700,fill:done?"var(--green)":"var(--text)"},done?"OK":left)
    ),
    h("div",{style:{flex:1}},
      h("div",{style:{fontWeight:700,fontSize:13,color:done?"var(--green)":"var(--text)"}},done?"Rest complete!":"Rest timer"),
      h("div",{style:{color:"var(--muted)",fontSize:11,marginTop:2}},done?"Ready!":"seconds remaining")
    ),
    h("div",{style:{display:"flex",flexDirection:"column",gap:5}},
      h("button",{className:"btn btn-ghost btn-sm",onClick:function(){setRunning(function(r){return !r;})}},running?"Pause":"Resume"),
      h("button",{className:"btn btn-ghost btn-sm",onClick:onClose},"Close")

}

function Settings(p){
  var cfg=p.cfg,tms=p.tms,onSave=p.onSave,onClose=p.onClose,appState=p.appState;
  var varState=useState(cfg.variant); var variant=varState[0],setVariant=varState[1];
  var accState=useState(cfg.accStyle); var acc=accState[0],setAcc=accState[1];
  var unitState=useState(cfg.unit); var unit=unitState[0],setUnit=unitState[1];
  var dl7State=useState(cfg.deloadEvery7||false); var deload7=dl7State[0],setDeload7=dl7State[1];
  var wuState=useState(cfg.warmup!==false); var warmupOn=wuState[0],setWarmupOn=wuState[1];
  var jokerState=useState(cfg.joker||false); var jokerOn=jokerState[0],setJokerOn=jokerState[1];
  var restState=useState(cfg.restSecs||180); var restSecs=restState[0],setRestSecs=restState[1];
  var inpState=useState(Object.fromEntries(LIFTS.map(function(l){return [l,tms[l]?String(toDisp(tms[l],cfg.unit)):""];})));
  var inp=inpState[0],setInp=inpState[1];
  var custState=useState(appState.customAcc||{squat:[],bench:[],deadlift:[],press:[]}); var customAcc=custState[0],setCustomAcc=custState[1];
  var custInpState=useState({squat:"",bench:"",deadlift:"",press:""}); var custInp=custInpState[0],setCustInp=custInpState[1];
  var msgState=useState(null); var csvMsg=msgState[0],setCsvMsg=msgState[1];
  var fileRef=useRef();
  var csvRef=useRef();

  function save(){
    var newTms={};
    LIFTS.forEach(function(l){var v=parseFloat(inp[l]);if(!isNaN(v)&&v>0)newTms[l]=rndW(fromDisp(v,unit)*0.9,"kg");});
    onSave({variant:variant,accStyle:acc,unit:unit,deloadEvery7:deload7,warmup:warmupOn,joker:jokerOn,restSecs:restSecs,tms:newTms,customAcc:customAcc});
    onClose();
  }

  function exportJSON(){
    var blob=new Blob([JSON.stringify(appState,null,2)],{type:"application/json"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="531plus_backup.json";a.click();
  }

  function exportCSV(){
    var rows=[];
    rows.push(["531+ Strength Tracker Export"]);
    rows.push([]);
    rows.push(["Initial 1RM(kg)","Deadlift","Squat","Bench Press","Military Press"]);
    rows.push(["",appState.tms.deadlift||"",appState.tms.squat||"",appState.tms.bench||"",appState.tms.press||""]);
    rows.push([]);
    rows.push(["Cycle#","Week#","Lift","TM(kg)","Actual(kg)","Date","Notes","Rating","Set1Reps","Set1Wt","Set2Reps","Set2Wt","Set3Reps","Set3Wt","e1RM"]);

    var liftNameMap={squat:"Squat",bench:"Bench Press",deadlift:"Dead Lift",press:"Military Press"};

    // Build rows from history, enriched with PR (e1RM) data where available
    var sortedHistory=appState.history.slice().sort(function(a,b){
      if(a.cycle!==b.cycle) return a.cycle-b.cycle;
      if(a.week!==b.week) return a.week-b.week;
      return a.id-b.id;
    });

    sortedHistory.forEach(function(entry){
      var liftKey=LIFTS[entry.day];
      var liftName=liftNameMap[liftKey]||entry.lift;
      // Find matching PR record for this cycle/week/lift for set + e1RM detail
      var prMatch=(appState.prs[liftKey]||[]).find(function(p){return p.cycle===entry.cycle&&p.week===entry.week;});
      var tm=prMatch&&prMatch.tm!==undefined?prMatch.tm:(appState.tms[liftKey]||"");
      var topWt=prMatch&&prMatch.topWt!==undefined?prMatch.topWt:"";
      var amrapReps=prMatch&&prMatch.amrap!==undefined?prMatch.amrap:(entry.amrap!=="—"?entry.amrap:"");
      var e1rm=prMatch?prMatch.est:"";
      var actual=topWt||"";

      rows.push([
        entry.cycle, entry.week, liftName, tm, actual, entry.date,
        '"'+(entry.notes||"").replace(/"/g,'""')+'"', "",
        "", "", "", "", amrapReps, topWt, e1rm
      ]);
    });

    var csv=rows.map(function(r){return r.join(",");}).join("\n");
    var blob=new Blob([csv],{type:"text/csv"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="531plus_sarasoft_export.csv";a.click();
  }

  function importJSON(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){try{var d=JSON.parse(ev.target.result);onSave(d,true);onClose();}catch(err){alert("Invalid backup file.");}};
    reader.readAsText(file);
  }

  function importCSV(e){
    var file=e.target.files[0];e.target.value="";if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var lines=ev.target.result.split("\n").map(function(l){return l.trim();}).filter(Boolean);
        function parseRow(line){
          var out=[],cur="",inQ=false;
          for(var i=0;i<line.length;i++){
            var ch=line[i];
            if(ch==='"'){ inQ=!inQ;}
            else if(ch===","&&!inQ){out.push(cur.trim());cur="";}
            else cur+=ch;
          }
          out.push(cur.trim());return out;
        }
        function normLift(name){
          var n=(name||"").toLowerCase();
          if(n.indexOf("dead")>=0)return"deadlift";
          if(n.indexOf("squat")>=0)return"squat";
          if(n.indexOf("bench")>=0)return"bench";
          if(n.indexOf("military")>=0||n.indexOf("press")>=0)return"press";
          return null;
        }
        var parsed=lines.map(parseRow);
        var dataStart=-1;
        for(var i=0;i<parsed.length;i++){
          if(parsed[i][0]==="Cycle#"){dataStart=i+1;break;}
        }
        if(dataStart<0)throw new Error("Could not find Cycle# header");
        var history=[],prs={squat:[],bench:[],deadlift:[],press:[]},latestTM={};
        var maxCycle=1,maxWeek=1,totalW=0;
        for(var i=dataStart;i<parsed.length;i++){
          var row=parsed[i];
          if(!row[0]||isNaN(parseInt(row[0])))continue;
          var cycle=parseInt(row[0]),week=parseInt(row[1]);
          var lift=normLift(row[2]),tm=parseFloat(row[3])||0;
          var date=(row[5]||"").replace(/"/g,"").trim();
          var notes=(row[6]||"").replace(/"/g,"").trim();
          if(!lift)continue;
          if(cycle>maxCycle||(cycle===maxCycle&&week>maxWeek)){maxCycle=cycle;maxWeek=week;}
          totalW=Math.max(totalW,(cycle-1)*4+week);
          if(tm>0)latestTM[lift]=tm;
          var amrapReps=parseInt(row[12])||0,amrapWt=parseFloat(row[13])||0;
          var est=(amrapReps>0&&amrapWt>0)?epley(amrapWt,amrapReps):null;
          if(est)prs[lift].push({cycle:cycle,week:week,est:est,tm:tm,topWt:amrapWt,amrap:amrapReps,date:date});
          history.push({id:Date.now()+i,date:date,cycle:cycle,week:week,day:LIFTS.indexOf(lift),lift:LIFT_LABELS[lift],topSet:(amrapWt||0)+"kg",amrap:amrapReps||"—",notes:notes||""});
        }
        if(!history.length)throw new Error("No workout rows found");
        var newTMs={};
        LIFTS.forEach(function(l){if(latestTM[l])newTMs[l]=r5(latestTM[l]);});
        var nextWeek=maxWeek>=4?1:maxWeek+1,nextCycle=maxWeek>=4?maxCycle+1:maxCycle;
        onSave({_csvImport:true,variant:cfg.variant,accStyle:cfg.accStyle,unit:"kg",deloadEvery7:cfg.deloadEvery7,warmup:cfg.warmup!==false,joker:cfg.joker||false,restSecs:cfg.restSecs||180,tms:newTMs,customAcc:appState.customAcc||{squat:[],bench:[],deadlift:[],press:[]},history:history.reverse(),prs:prs,week:nextWeek,cycle:nextCycle,day:0,totalWeeks:totalW});
        setCsvMsg({ok:true,text:"Imported "+history.length+" sessions across "+maxCycle+" cycles."});
        setTimeout(function(){setCsvMsg(null);onClose();},2000);
      }catch(err){setCsvMsg({ok:false,text:"Import failed: "+err.message});}
    };
    reader.readAsText(file);
  }

  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:300,overflowY:"auto",WebkitOverflowScrolling:"touch"}},
    h("div",{style:{maxWidth:500,margin:"0 auto",padding:"12px 12px 60px"}},
      h("div",{className:"card",style:{marginTop:8}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
          h("div",{style:{fontWeight:700,fontSize:15,textTransform:"uppercase"}},"Settings"),
          h("button",{className:"btn btn-ghost btn-sm",onClick:onClose},"Close")
        ),
        // Program
        h("div",{style:{marginBottom:16}},
          h("label",{className:"lbl"},"Program"),
          VARIANTS.map(function(v){
            return h("div",{key:v.id,className:"variant-card"+(variant===v.id?" selected":""),style:{marginBottom:5},onClick:function(){setVariant(v.id);}},
              h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                h("div",{className:"radio"+(variant===v.id?" selected":"")}),
                h("div",null,h("div",{style:{fontWeight:700,fontSize:12,color:"#ddd"}},v.name),h("div",{style:{color:"#999",fontSize:11}},v.desc))
              )
            );
          })
        ),
        // Accessories
        h("div",{style:{marginBottom:16}},
          h("label",{className:"lbl"},"Accessories"),
          ACC_STYLES.map(function(a){
            return h("div",{key:a.id,className:"variant-card"+(acc===a.id?" selected":""),style:{marginBottom:5},onClick:function(){setAcc(a.id);}},
              h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                h("div",{className:"radio"+(acc===a.id?" selected":"")}),
                h("div",null,h("div",{style:{fontWeight:700,fontSize:12,color:"#ddd"}},a.name),h("div",{style:{color:"#999",fontSize:11}},a.desc))
              )
            );
          })
        ),
        // Options
        h("div",{style:{marginBottom:16}},
          h("label",{className:"lbl"},"Options"),
          h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
            h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
              h("span",{style:{fontSize:13}},"Warm-up sets"),
              h("div",{className:"flex-row",style:{gap:6}},
                h("button",{className:"sel-btn"+(warmupOn?" active":""),onClick:function(){setWarmupOn(true);}},"On"),
                h("button",{className:"sel-btn"+(!warmupOn?" active":""),onClick:function(){setWarmupOn(false);}},"Off")
              )
            ),
            h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
              h("span",{style:{fontSize:13}},"Joker sets"),
              h("div",{className:"flex-row",style:{gap:6}},

                h("button",{className:"sel-btn"+(!jokerOn?" active":""),onClick:function(){setJokerOn(false);}},"Off")

            h("button",{className:"sel-btn"+(unit==="lbs"?" active":""),onClick:function(){setUnit("lbs");}},"lbs")

                h("input",{className:"inp",type:"number",inputMode:"decimal",value:inp[l]||"",onChange:function(e){var v=e.target.value;setInp(function(p){var n=Object.assign({},p);n[l]=v;return n;})}})
              );
            })
          )

        h("button",{className:"btn btn-gold",style:{width:"100%",marginBottom:16},onClick:save},"Save Settings"),
        // Backup
        h("div",{style:{borderTop:"1px solid var(--border)",paddingTop:14}},

            h("button",{className:"btn btn-outline btn-sm",style:{color:"var(--green)",borderColor:"var(--green)"},onClick:exportCSV},"Export CSV"),
            h("button",{className:"btn btn-ghost btn-sm",onClick:function(){fileRef.current.click();}},"Import JSON"),
            h("button",{className:"btn btn-ghost btn-sm",style:{color:"var(--blue)",borderColor:"var(--blue)"},onClick:function(){csvRef.current.click();}},"Import Sarasoft CSV")
          ),
          h("input",{ref:fileRef,type:"file",accept:".json",style:{display:"none"},onChange:importJSON}),
          h("input",{ref:csvRef,type:"file",accept:".csv,.txt",style:{display:"none"},onChange:importCSV}),
          csvMsg&&h("div",{style:{marginTop:8,padding:"8px 10px",background:csvMsg.ok?"rgba(39,174,96,.15)":"rgba(192,57,43,.15)",border:"1px solid "+(csvMsg.ok?"var(--green)":"var(--red)"),borderRadius:3,fontSize:12,color:csvMsg.ok?"var(--green)":"var(--red)"}},csvMsg.text),
          h("p",{style:{color:"var(--muted)",fontSize:11,marginTop:8}},"JSON export for full backup/restore. CSV export is Sarasoft-compatible (Cycle, Week, Lift, TM, Date, Notes, sets, AMRAP, e1RM). Sarasoft CSV import pulls in your full history.")
        )
      )
    )
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  var saved=loadSt()||DEFAULT;
  var stState=useState(saved); var st=stState[0],setSt=stState[1];
  var showSetState=useState(false); var showSettings=showSetState[0],setShowSettings=showSetState[1];
  var tabState=useState("home"); var tab=tabState[0],setTab=tabState[1];
  var timerState=useState(null); var timer=timerState[0],setTimer=timerState[1];
  var calcWState=useState(""); var calcW=calcWState[0],setCalcW=calcWState[1];
  var calcRState=useState(""); var calcR=calcRState[0],setCalcR=calcRState[1];
  var calcResState=useState(null); var calcRes=calcResState[0],setCalcRes=calcResState[1];
  var bwInpState=useState(""); var bwInp=bwInpState[0],setBwInp=bwInpState[1];

  useEffect(function(){saveSt(st);},[st]);

  function upd(patch){setSt(function(p){return Object.assign({},p,patch);});}

  function completeSetup(data){
    setSt(function(p){return Object.assign({},p,{setupDone:true,cfg:{variant:data.variant,accStyle:data.accStyle,unit:data.unit,deloadEvery7:data.deloadEvery7,warmup:true,joker:false,restSecs:180},tms:data.tms,customAcc:data.customAcc||{squat:[],bench:[],deadlift:[],press:[]},week:1,day:0,cycle:1,totalWeeks:0});});
  }

  function saveSettings(data,isImport){
    if(isImport){setSt(Object.assign({},DEFAULT,data,{setupDone:true}));return;}
    if(data._csvImport){
      setSt(function(p){return Object.assign({},p,{setupDone:true,cfg:Object.assign({},p.cfg,{variant:data.variant,accStyle:data.accStyle,unit:data.unit,deloadEvery7:data.deloadEvery7,warmup:data.warmup!==false,joker:data.joker||false,restSecs:data.restSecs||180}),tms:data.tms,customAcc:data.customAcc||p.customAcc,history:data.history||p.history,prs:data.prs||p.prs,week:data.week||p.week,cycle:data.cycle||p.cycle,day:data.day||0,totalWeeks:data.totalWeeks||p.totalWeeks});});
      return;
    }
    setSt(function(p){return Object.assign({},p,{cfg:Object.assign({},p.cfg,{variant:data.variant,accStyle:data.accStyle,unit:data.unit,deloadEvery7:data.deloadEvery7,warmup:data.warmup!==false,joker:data.joker||false,restSecs:data.restSecs||180}),tms:data.tms,customAcc:data.customAcc||p.customAcc});});
  }

  function advanceWeek(){
    setSt(function(p){
      var week=p.week,cycle=p.cycle,totalWeeks=p.totalWeeks,tms=p.tms,cfg=p.cfg;
      var newTotal=totalWeeks+1;
      if(cfg.deloadEvery7&&newTotal%7===0&&week!==4)return Object.assign({},p,{week:4,day:0,totalWeeks:newTotal});
      if(week<4)return Object.assign({},p,{week:week+1,day:0,totalWeeks:newTotal});
      var nt=Object.assign({},tms);
      LIFTS.forEach(function(l){if(nt[l])nt[l]=r5(nt[l]+(l==="squat"||l==="deadlift"?5:2.5));});
      return Object.assign({},p,{week:1,day:0,cycle:cycle+1,tms:nt,totalWeeks:newTotal});
    });
  }

  function goBack(){
    setSt(function(p){
      if(p.day>0)return Object.assign({},p,{day:p.day-1});
      if(p.week>1)return Object.assign({},p,{week:p.week-1,day:3});
      if(p.cycle>1)return Object.assign({},p,{week:4,cycle:p.cycle-1,day:3});
      return p;
    });
  }

  function setCheck(k,v){
    setSt(function(p){var c=Object.assign({},p.checks);c[k]=v;return Object.assign({},p,{checks:c});});
    if(v&&k.indexOf("_done")>=0)setTimer({secs:st.cfg.restSecs||180});
  }
  function setNote(k,v){setSt(function(p){var n=Object.assign({},p.notes);n[k]=v;return Object.assign({},p,{notes:n});});}
  function setAmrap(k,v){setSt(function(p){var a=Object.assign({},p.amraps);a[k]=v;return Object.assign({},p,{amraps:a});});}
  function setWodScale(k,v){setSt(function(p){var w=Object.assign({},p.wodScale);w[k]=v;return Object.assign({},p,{wodScale:w});});}
  function setExHistory(fn){setSt(function(p){return Object.assign({},p,{exHistory:fn(p.exHistory||{})});});}

  function logWorkout(){
    var lift=LIFTS[st.day];
    var tm=st.tms[lift]||0;
    var ms=getMainSets(st.cfg.variant,st.week);
    var topSet=ms[ms.length-1];
    var topWt=r5(tm*topSet.pct);
    var ak="w"+st.week+"d"+st.day+"s"+(ms.length-1);
    var ar=parseInt(st.amraps[ak])||0;
    var est=ar>0?epley(topWt,ar):null;
    if(est){
      setSt(function(p){
        var prs=Object.assign({},p.prs);
        prs[lift]=(prs[lift]||[]).concat([{cycle:p.cycle,week:p.week,est:est,tm:tm,topWt:topWt,amrap:ar,date:new Date().toLocaleDateString()}]);
        return Object.assign({},p,{prs:prs});
      });
    }
    var entry={id:Date.now(),date:new Date().toLocaleDateString(),cycle:st.cycle,week:st.week,day:st.day,lift:LIFT_LABELS[lift],topSet:toDisp(topWt,st.cfg.unit)+toLbl(st.cfg.unit),amrap:ar||"—",notes:st.notes["w"+st.week+"d"+st.day]||""};
    setSt(function(p){return Object.assign({},p,{history:[entry].concat(p.history)});});
    if(st.day<3)setSt(function(p){return Object.assign({},p,{day:p.day+1});});
  }

  function logBW(){
    var v=parseFloat(bwInp);if(isNaN(v)||v<=0)return;
    setSt(function(p){return Object.assign({},p,{bwLog:p.bwLog.concat([{date:new Date().toLocaleDateString(),w:v}])});});
    setBwInp("");
  }

  if(!st.setupDone)return h(Wizard,{onComplete:completeSetup});

  var lift=LIFTS[st.day];
  var tm=st.tms[lift]||0;
  var ms=getMainSets(st.cfg.variant,st.week);
  var bo=getBackoff(st.cfg.variant,st.week,tm);
  var wodIdx=(st.cycle-1)%3;
  var wod=WODS[lift]&&WODS[lift][wodIdx];
  var sk="w"+st.week+"d"+st.day;
  var curScale=st.wodScale[sk]||"rx";
  var dispTM=tm?toDisp(tm,st.cfg.unit):0;
  var varLabel=(VARIANTS.find(function(v){return v.id===st.cfg.variant;})||{name:""}).name;

  // Warmup sets helper
  function warmupSets(tm){return [{pct:.40,reps:5},{pct:.50,reps:5},{pct:.60,reps:5}].map(function(s){return Object.assign({},s,{wt:r5(tm*s.pct)});});}

  // ── RENDER SECTIONS ───────────────────────────────────────────────────────
  var header=h("div",{style:{background:"var(--panel)",borderBottom:"2px solid var(--gold)",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,gap:8}},

  function ProgressChart(props){
    var series=props.series, unit=props.unit||"";
    var canvasRef=useRef();
    var chartRef=useRef();

    useEffect(function(){
      if(!canvasRef.current) return;
      var allX=[];
      series.forEach(function(s){s.data.forEach(function(d){if(allX.indexOf(d.x)<0)allX.push(d.x);});});

      var datasets=series.filter(function(s){return s.data.length>0;}).map(function(ser){
        // Map each x-label to its y value (sparse across allX)
        var dataMap={};
        ser.data.forEach(function(d){dataMap[d.x]=d.y;});
        var dataArr=allX.map(function(x){return dataMap.hasOwnProperty(x)?dataMap[x]:null;});
        return {
          label:ser.label,
          data:dataArr,
          borderColor:ser.color,
          backgroundColor:ser.color+"33",
          pointBackgroundColor:ser.color,
          pointBorderColor:"#0d0d0d",
          pointBorderWidth:2,
          pointRadius:5,
          pointHoverRadius:8,
          borderWidth:2.5,
          tension:0.25,
          fill:false,
          spanGaps:true,
        };
      });

      if(chartRef.current){ chartRef.current.destroy(); }

      var ctx=canvasRef.current.getContext("2d");
      chartRef.current=new Chart(ctx,{
        type:"line",
        data:{labels:allX,datasets:datasets},
        options:{
          responsive:true,
          maintainAspectRatio:false,
          interaction:{mode:"index",intersect:false},
          plugins:{
            legend:{
              labels:{color:"#e8e8ea",font:{size:12,weight:"600"},usePointStyle:true,pointStyle:"circle"}
            },
            tooltip:{
              backgroundColor:"#1c1c1e",
              titleColor:"#ffd700",
              bodyColor:"#e8e8ea",
              borderColor:"#2c2c2e",
              borderWidth:1,
              padding:12,
              titleFont:{size:13,weight:"700"},
              bodyFont:{size:13},
              callbacks:{
                label:function(ctx){
                  var v=ctx.parsed.y;
                  if(v===null||v===undefined) return null;
                  return " "+ctx.dataset.label+": "+v+unit+" e1RM";
                }
              }
            }
          },
          scales:{
            x:{
              ticks:{color:"#6b6b6e",font:{size:10}},
              grid:{color:"#222"}
            },
            y:{
              ticks:{color:"#6b6b6e",font:{size:11},callback:function(v){return v+unit;}},
              grid:{color:"#222"}
            }
          }
        }
      });

      return function(){ if(chartRef.current){ chartRef.current.destroy(); chartRef.current=null; } };
    },[JSON.stringify(series),unit]);

    var hasData=series.some(function(s){return s.data.length>0;});
    if(!hasData) return h("div",{style:{height:200,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)",fontSize:13}},"Log AMRAP sets to populate this chart");

    return h("div",{style:{height:500,position:"relative"}},
      h("canvas",{ref:canvasRef})
    );
  }

  var progressContent=h("div",null,
    h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}},
      [{n:st.cycle,l:"Cycle"},{n:st.week,l:"Week"},{n:st.totalWeeks,l:"Total Wks"},{n:st.history.length,l:"Sessions"}].map(function(s){
        return h("div",{key:s.l,className:"stat-box",style:{flex:"1 1 60px"}},h("div",{className:"stat-num"},s.n),h("div",{className:"stat-lbl"},s.l));
      })
    ),
    h("div",{className:"card"},
      h("div",{className:"section-title"},"Est. 1RM Progress"),
      h(ProgressChart,{unit:toLbl(st.cfg.unit),series:[
        {label:"Squat",    color:"#ffd700",data:(st.prs.squat||[]).map(function(p){return{x:"C"+p.cycle+"W"+p.week,y:toDisp(p.est,st.cfg.unit)};})},
        {label:"Bench",    color:"#3498db",data:(st.prs.bench||[]).map(function(p){return{x:"C"+p.cycle+"W"+p.week,y:toDisp(p.est,st.cfg.unit)};})},
        {label:"Deadlift", color:"#e74c3c",data:(st.prs.deadlift||[]).map(function(p){return{x:"C"+p.cycle+"W"+p.week,y:toDisp(p.est,st.cfg.unit)};})},
        {label:"OHP",      color:"#9b59b6",data:(st.prs.press||[]).map(function(p){return{x:"C"+p.cycle+"W"+p.week,y:toDisp(p.est,st.cfg.unit)};})},
      ]})
    ),
    // Cycle overview — Target (TM at the time) vs Achieved (best e1RM that cycle)
    (function(){
      var cycles={};
      LIFTS.forEach(function(l){
        (st.prs[l]||[]).forEach(function(p){
          if(!cycles[p.cycle])cycles[p.cycle]={};
          var curTM=p.tm!==undefined?toDisp(p.tm,st.cfg.unit):null;
          var curEst=toDisp(p.est,st.cfg.unit);
          if(!cycles[p.cycle][l]||curEst>cycles[p.cycle][l].actual){
            cycles[p.cycle][l]={target:curTM,actual:curEst};
          }
        });
      });
      var cNums=Object.keys(cycles).sort(function(a,b){return b-a;}).slice(0,6);
      if(!cNums.length) return null;
      return h("div",null,
        h("div",{style:{fontWeight:700,fontSize:14,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}},"Cycle Overview"),
        cNums.map(function(cn){
          var cData=cycles[cn];
          return h("div",{key:cn,className:"card",style:{marginBottom:10}},
            h("div",{style:{fontWeight:700,fontSize:14,marginBottom:10}},"Cycle #"+cn),
            h("table",{style:{width:"100%",borderCollapse:"collapse"}},
              h("thead",null,h("tr",null,
                h("td",{style:{fontSize:10,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",paddingBottom:6}},"Lift"),
                LIFTS.map(function(l){return h("td",{key:l,style:{fontSize:10,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",paddingBottom:6,textAlign:"center"}},LIFT_LABELS[l]);})
              )),
              h("tbody",null,
                h("tr",null,
                  h("td",{style:{fontSize:12,color:"var(--muted)",paddingBottom:4}},"Target e1RM"),
                  LIFTS.map(function(l){
                    var t=cData[l]&&cData[l].target;
                    return h("td",{key:l,style:{textAlign:"center",fontWeight:600,fontSize:15,paddingBottom:4}},t!=null?t:"—");
                  })
                ),
                h("tr",null,
                  h("td",{style:{fontSize:12,color:"var(--muted)"}},"Achieved e1RM"),
                  LIFTS.map(function(l){
                    var t=(cData[l]&&cData[l].target)||0, a=(cData[l]&&cData[l].actual)||0;
                    var col=!a?"var(--muted)":(t&&a>=t)?"var(--green)":(t?"var(--red)":"var(--gold)");
                    return h("td",{key:l,style:{textAlign:"center",fontWeight:800,fontSize:17,color:col}},a||"—");
                  })
                )
              )
            )
          );
        })
      );
    })(),
    h("div",{className:"card"},
      h("div",{className:"section-title"},"Est. 1RM Records"),
      Object.keys(st.prs).length===0?h("p",{style:{color:"var(--muted)",textAlign:"center",padding:10}},"Log AMRAP sets to track PRs."):
      LIFTS.filter(function(l){return st.prs[l]&&st.prs[l].length;}).map(function(l){
        var latest=(st.prs[l]||[]).slice(-1)[0];
        return h("div",{key:l,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid var(--border)"}},
          h("span",{style:{fontWeight:600,fontSize:15}},LIFT_LABELS[l]),
          h("span",{style:{fontWeight:900,fontSize:20,color:"var(--gold)"}},latest?"~"+toDisp(latest.est,st.cfg.unit)+toLbl(st.cfg.unit):"—")
        );
      })
    ),
    h("div",{className:"card"},
      h("div",{className:"section-title"},"Training Maxes"),
      h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        LIFTS.filter(function(l){return st.tms[l];}).map(function(l){
          return h("div",{key:l,className:"stat-box",style:{flex:"1 1 60px"}},h("div",{className:"stat-num"},toDisp(st.tms[l],st.cfg.unit)),h("div",{className:"stat-lbl"},LIFT_LABELS[l]+" TM"));
        })
      )
    )
  );

  // ── HISTORY TAB ──────────────────────────────────────────────────────────
  var histContent=h("div",{className:"card"},
    h("div",{className:"section-title"},"Workout Log"),
    st.history.length===0?h("p",{style:{color:"var(--muted)",textAlign:"center",padding:20}},"No workouts logged yet."):
    h("div",{style:{overflowX:"auto"}},
      h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:320}},
        h("thead",null,h("tr",null,["Date","Lift","C/Wk","Top","AMRAP","Notes"].map(function(hd){return h("th",{key:hd,style:{textAlign:"left",padding:"4px 8px",fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",borderBottom:"1px solid var(--border)"}},hd);}))),
        h("tbody",null,
          st.history.map(function(e){
            return h("tr",{key:e.id,style:{borderBottom:"1px solid var(--border)"}},
              h("td",{style:{padding:"7px 8px",color:"var(--muted)"}},e.date),
              h("td",{style:{padding:"7px 8px",fontWeight:700}},e.lift),
              h("td",{style:{padding:"7px 8px",color:"var(--muted)"}},"C"+e.cycle+"W"+e.week),
              h("td",{style:{padding:"7px 8px",color:"var(--gold)",fontWeight:700}},e.topSet),
              h("td",{style:{padding:"7px 8px"}},e.amrap),
              h("td",{style:{padding:"7px 8px",color:"var(--muted)",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},e.notes)
            );
          })
        )
      )
    )
  );

  return h("div",null,
    showSettings&&h(Settings,{cfg:st.cfg,tms:st.tms,onSave:saveSettings,onClose:function(){setShowSettings(false);},appState:st}),
    timer&&h(RestTimer,{secs:timer.secs,onClose:function(){setTimer(null);}}),
    header,
    tabBar,
    h("div",{style:{padding:12,maxWidth:820,margin:"0 auto"}},
      tab==="home"&&homeContent,
      tab==="workout"&&workoutContent,
      tab==="calc"&&calcContent,
      tab==="progress"&&progressContent,
      tab==="history"&&histContent
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(h(App,null));
</script>
</body>
</html>

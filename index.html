};
const BEG_WAVES={
  1:[{pct:.65,reps:5},{pct:.75,reps:5},{pct:.85,reps:5}],
  2:[{pct:.70,reps:3},{pct:.80,reps:3},{pct:.90,reps:3}],
  3:[{pct:.75,reps:5},{pct:.85,reps:3},{pct:.95,reps:1}],

};
const PYRAMID=[{pct:.75,reps:5},{pct:.85,reps:3},{pct:.95,reps:1},{pct:.85,reps:3},{pct:.75,reps:5}];

function mainSets(v,w){
  if(v==="beginner") return BEG_WAVES[w]||WAVES[w];
  if(v==="pyramid")  return PYRAMID;
  return WAVES[w];
}
function backoff(v,w){
  const wv=WAVES[w];
  if(v==="fsl")     return Array(5).fill({pct:wv[0].pct,reps:5,label:"FSL 5×5"});
  if(v==="ssl")     return Array(5).fill({pct:wv[1].pct,reps:5,label:"SSL 5×5"});
  if(v==="bbb"||v==="monolith") return Array(5).fill({pct:.50,reps:10,label:"BBB 5×10"});
  return [];
}

const WODS={

  ],

    {name:'WOD B: "Barrage"', rx:"5 rounds: 8 DB bench 22kg · 8 DB row 22kg · 10 push-ups",scaled:"5 rounds: 8 DB bench 15kg · 8 DB row 15kg · 10 knee push-ups",begin:"4 rounds: 8 DB bench 10kg · 8 DB row 10kg · 8 knee push-ups"},

    {name:'WOD A: "Grind"',   rx:"4 rounds: 8 RDL (50% TM) · 12 GHD sit-ups · 12 back ext",scaled:"4 rounds: 8 RDL (35% TM) · 12 sit-ups · 12 back ext",begin:"3 rounds: 8 KB deadlift · 10 sit-ups · 10 back ext"},
    {name:'WOD B: "Anchor"',  rx:"AMRAP 12min: 6 power cleans (40% DL TM) · 9 burpees · 12 KB swings 32kg",scaled:"AMRAP 12min: 6 power cleans (25% DL TM) · 9 burpees · 12 KB swings 20kg",begin:"AMRAP 10min: 6 KB deadlifts · 6 burpees · 10 KB swings 16kg"},
    {name:'WOD C: "Bedrock"', rx:"5 rounds: 5 trap bar DL (60% TM) · 10 box jumps · 200m run",scaled:"5 rounds: 5 trap bar DL (40% TM) · 10 step-ups · 200m run",begin:"4 rounds: 5 KB deadlift · 8 step-ups · 150m run"},

// ── HELPERS ───────────────────────────────────────────────────────────────────
const r5=(v)=>Math.round(v/2.5)*2.5;
const r5lb=(v)=>Math.round(v/5)*5;
const epley=(w,r)=>r===1?w:Math.round(w*(1+r/30));
const epleyJS=(w,r)=>r===1?w:Math.round(w*(1+r/30));
const toDisp=(kg,u)=>u==="lbs"?Math.round(kg*2.2046):kg;
const toLbl=(u)=>u==="lbs"?"lbs":"kg";
const fromDisp=(v,u)=>u==="lbs"?v/2.2046:v;
const rndW=(v,u)=>u==="lbs"?r5lb(v):r5(v);


// ── WARM-UP SETS (40%, 50%, 60% × 5 reps each) ───────────────────────────────
function warmupSets(tm){ return [{pct:.40,reps:5},{pct:.50,reps:5},{pct:.60,reps:5}].map(s=>({...s,wt:r5(tm*s.pct)})); }

// ── JOKER SETS: +5% increments above top working set ─────────────────────────
function jokerSets(tm, topPct, count=3){ return Array.from({length:count},(_,i)=>({pct:topPct+(i+1)*0.05, wt:r5(tm*(topPct+(i+1)*0.05)), reps:"1-3"})); }
const STORAGE_KEY="531plus_v2";

function saveState(s){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch{}}

  const[tooltip,setTooltip]=useState(null);
  const[zoom,setZoom]=useState({start:0,end:1}); // 0-1 range of visible window
  const[pinch,setPinch]=useState(null);
  const[dragging,setDragging]=useState(null);

  const allY=series.flatMap(s=>s.data.map(d=>d.y)).filter(v=>!isNaN(v));
  const allX=[...new Set(series.flatMap(s=>s.data.map(d=>d.x)))];

  const H=260, W=500, pad={l:44,r:12,t:16,b:32};

  // Visible window based on zoom
  const visStart=Math.floor(zoom.start*(allX.length-1));
  const visEnd=Math.ceil(zoom.end*(allX.length-1));
  const visX=allX.slice(visStart,visEnd+1);

  const visY=series.flatMap(s=>s.data.filter(d=>visX.includes(d.x)).map(d=>d.y)).filter(v=>!isNaN(v));
  const mn=visY.length?Math.min(...visY)*0.97:0;
  const mx=visY.length?Math.max(...visY)*1.03:100;
  const rng=mx-mn||1;

  const py=v=>pad.t+(1-(v-mn)/rng)*(H-pad.t-pad.b);
  const px=xi=>pad.l+(xi/(visX.length-1||1))*(W-pad.l-pad.r);

  // Grid lines
  const gridCount=5;
  const gridVals=Array.from({length:gridCount},(_,i)=>mn+i*(mx-mn)/(gridCount-1));

  // X label density
  const xStep=Math.max(1,Math.ceil(visX.length/8));

  function getSVGX(clientX){
    const rect=svgRef.current?.getBoundingClientRect();
    if(!rect) return 0;
    return((clientX-rect.left)/rect.width)*W;
  }

  function findClosestPoint(svgX){
    if(!visX.length) return null;
    const xi=Math.round((svgX-pad.l)/(W-pad.l-pad.r)*(visX.length-1));
    const cxi=Math.max(0,Math.min(visX.length-1,xi));
    const label=visX[cxi];
    const points=series.map(ser=>{
      const d=ser.data.find(p=>p.x===label);
      return d?{label:ser.label,color:ser.color,y:d.y}:null;
    }).filter(Boolean);
    return{x:px(cxi),label,points};
  }

  // Touch handlers
  function onTouchStart(e){
    if(e.touches.length===1){
      const tx=getSVGX(e.touches[0].clientX);
      const pt=findClosestPoint(tx);
      if(pt) setTooltip(pt);
      setDragging({startX:e.touches[0].clientX,startZoom:{...zoom}});
    } else if(e.touches.length===2){
      setPinch({
        dist:Math.abs(e.touches[0].clientX-e.touches[1].clientX),
        midX:(e.touches[0].clientX+e.touches[1].clientX)/2,
        startZoom:{...zoom}
      });
    }
  }

  function onTouchMove(e){
    e.preventDefault();
    if(e.touches.length===1&&dragging){
      // Pan
      const dx=(e.touches[0].clientX-dragging.startX);
      const rect=svgRef.current?.getBoundingClientRect();
      if(!rect) return;
      const shift=-(dx/rect.width)*(dragging.startZoom.end-dragging.startZoom.start);
      const s=dragging.startZoom;
      const w=s.end-s.start;
      const ns=Math.max(0,Math.min(1-w,s.start+shift));
      setZoom({start:ns,end:ns+w});
      const tx=getSVGX(e.touches[0].clientX);
      const pt=findClosestPoint(tx);
      if(pt) setTooltip(pt);
    } else if(e.touches.length===2&&pinch){
      // Pinch zoom
      const dist=Math.abs(e.touches[0].clientX-e.touches[1].clientX);
      const scale=pinch.dist/Math.max(dist,1);
      const s=pinch.startZoom;
      const mid=(s.start+s.end)/2;
      const hw=(s.end-s.start)*scale/2;
      const ns=Math.max(0,mid-hw);
      const ne=Math.min(1,mid+hw);
      if(ne-ns>0.05) setZoom({start:ns,end:ne});
    }
  }

  function onTouchEnd(){setDragging(null);setPinch(null);}

  function onMouseMove(e){
    const tx=getSVGX(e.clientX);
    const pt=findClosestPoint(tx);
    if(pt) setTooltip(pt);
  }

  function resetZoom(){setZoom({start:0,end:1});setTooltip(null);}

  if(allY.length<2) return(
    <div style={{height:180,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)",fontSize:13}}>
      Log workouts with AMRAP sets to populate graph
    </div>
  );

  const isZoomed=zoom.start>0.01||zoom.end<0.99;

  return(
    <div style={{userSelect:"none"}}>
      {/* Zoom controls */}
      <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
        <button style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",padding:"3px 9px",background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",cursor:"pointer",borderRadius:2}} onClick={()=>setZoom(z=>({start:Math.max(0,z.start+(z.end-z.start)*.2),end:Math.min(1,z.end-(z.end-z.start)*.2)}))}>+ Zoom In</button>
        <button style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",padding:"3px 9px",background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",cursor:"pointer",borderRadius:2}} onClick={()=>setZoom(z=>({start:Math.max(0,z.start-(z.end-z.start)*.3),end:Math.min(1,z.end+(z.end-z.start)*.3)}))}>− Zoom Out</button>
        {isZoomed&&<button style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",padding:"3px 9px",background:"transparent",border:"1px solid var(--gold)",color:"var(--gold)",cursor:"pointer",borderRadius:2}} onClick={resetZoom}>Reset</button>}
        <span style={{fontSize:10,color:"var(--muted)",marginLeft:4}}>Pinch or drag to zoom/pan</span>
      </div>

      {/* SVG chart */}
      <div style={{position:"relative",touchAction:"none"}}>
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block",cursor:"crosshair"}}
          onMouseMove={onMouseMove} onMouseLeave={()=>setTooltip(null)}
          onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>

          {/* Grid */}
          {gridVals.map((v,i)=><g key={i}>
            <line x1={pad.l} x2={W-pad.r} y1={py(v)} y2={py(v)} stroke="#222" strokeWidth="1"/>
            <text x={pad.l-4} y={py(v)+4} textAnchor="end" fontSize="9" fill="#555">{Math.round(v)}</text>
          </g>)}

          {/* X labels */}
          {visX.map((lbl,xi)=>xi%xStep===0&&<text key={xi} x={px(xi)} y={H-6} textAnchor="middle" fontSize="8.5" fill="#555">{lbl}</text>)}

          {/* Series */}
          {series.map((ser,si)=>{
            const visData=ser.data.filter(d=>visX.includes(d.x));
            if(!visData.length) return null;
            const pts=visData.map(d=>`${px(visX.indexOf(d.x))},${py(d.y)}`).join(" ");
            const uid=`cg${si}`;
            const fx=px(visX.indexOf(visData[0].x));
            const lx=px(visX.indexOf(visData[visData.length-1].x));
            return<g key={si}>
              <defs><linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={ser.color} stopOpacity=".2"/>
                <stop offset="100%" stopColor={ser.color} stopOpacity="0"/>
              </linearGradient></defs>
              {visData.length>1&&<polygon points={`${fx},${py(mn)} ${pts} ${lx},${py(mn)}`} fill={`url(#${uid})`}/>}
              <polyline points={pts} fill="none" stroke={ser.color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
              {visData.map((d,di)=><circle key={di} cx={px(visX.indexOf(d.x))} cy={py(d.y)} r="4" fill={ser.color} stroke="#0a0a0a" strokeWidth="1.5"/>)}
            </g>;
          })}

          {/* Tooltip vertical line */}
          {tooltip&&<line x1={tooltip.x} x2={tooltip.x} y1={pad.t} y2={H-pad.b} stroke="rgba(255,255,255,.2)" strokeWidth="1" strokeDasharray="4 3"/>}
        </svg>

        {/* Tooltip box */}
        {tooltip&&<div style={{position:"absolute",top:10,left:tooltip.x>W*.6*((svgRef.current?.getBoundingClientRect()?.width||W)/W)?"auto":"calc("+((tooltip.x/W)*100)+"% + 8px)",right:tooltip.x>W*.6*((svgRef.current?.getBoundingClientRect()?.width||W)/W)?`calc(${((1-tooltip.x/W)*100)}% + 8px)`:"auto",background:"#1e1e1e",border:"1px solid var(--border)",borderRadius:4,padding:"7px 10px",minWidth:110,pointerEvents:"none",zIndex:10,boxShadow:"0 4px 16px rgba(0,0,0,.6)"}}>
          <div style={{fontSize:10,color:"var(--gold)",fontWeight:700,marginBottom:5,letterSpacing:.5}}>{tooltip.label}</div>
          {tooltip.points.map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:p.color,flexShrink:0}}/>
            <span style={{fontSize:11,color:"#aaa"}}>{p.label}</span>
            <span style={{fontSize:12,fontWeight:700,color:p.color,marginLeft:"auto"}}>{p.y}{unit}</span>
          </div>)}
        </div>}
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:10}}>
        {series.filter(s=>s.data.length>0).map((ser,si)=><div key={si} style={{display:"flex",alignItems:"center",gap:5,fontSize:12}}>
          <div style={{width:18,height:3,background:ser.color,borderRadius:2}}/>
          <span style={{color:"#999"}}>{ser.label}</span>
          <span style={{color:ser.color,fontWeight:700}}>{ser.data[ser.data.length-1].y}{unit}</span>
        </div>)}
      </div>
    </div>
  );
}

// ── EXERCISE NOTES + HISTORY ──────────────────────────────────────────────────
function ExNotes({exKey,label,notes,onNoteChange,exHistory,setExHistory,placeholder="Notes, load, feel..."}){
  const[open,setOpen]=useState(false);
  const[histOpen,setHistOpen]=useState(false);
  const entries=exHistory[label]||[];
  function save(){
    const txt=(notes[exKey]||"").trim();
    if(!txt)return;
    setExHistory(p=>({...p,[label]:[{date:new Date().toLocaleDateString(),note:txt},...(p[label]||[])]}));
  }
  return(
    <div style={{marginTop:8}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button onClick={()=>setOpen(o=>!o)} style={btnStyle("ghost","xs")}>{open?"▲":"▼"} Notes{notes[exKey]?" ●":""}</button>
        {entries.length>0&&<button onClick={()=>setHistOpen(o=>!o)} style={{...btnStyle("ghost","xs"),color:"var(--blue)",borderColor:"rgba(41,128,185,.4)"}}>📋 History ({entries.length})</button>}
      </div>
      {open&&<div style={{marginTop:6}}>
        <textarea style={inputStyle()} rows="2" placeholder={placeholder} value={notes[exKey]||""} onChange={e=>onNoteChange(exKey,e.target.value)}/>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
          <button onClick={save} style={btnStyle("green","xs")}>Save Note</button>
        </div>
      </div>}
      {histOpen&&<div style={{marginTop:6,background:"#0d0d0d",border:"1px solid var(--border)",borderRadius:3,padding:"8px 10px"}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>{label} — History</div>
        {entries.map((e,i)=><div key={i} style={{borderBottom:i<entries.length-1?"1px solid var(--border)":"none",padding:"6px 0"}}>
          <div style={{fontSize:10,color:"var(--gold)",fontWeight:700,marginBottom:2}}>{e.date}</div>
          <div style={{fontSize:13,color:"var(--text)",lineHeight:1.5,whiteSpace:"pre-wrap"}}>{e.note}</div>
        </div>)}
      </div>}
    </div>
  );
}

// ── SHARED STYLE HELPERS ──────────────────────────────────────────────────────
function btnStyle(v,sz){
  const sm=sz==="xs"||sz==="sm";
  const base={fontWeight:700,fontSize:sm?10:12,letterSpacing:1,textTransform:"uppercase",padding:sz==="xs"?"3px 8px":sm?"5px 12px":"9px 18px",cursor:"pointer",borderRadius:3,display:"inline-flex",alignItems:"center",gap:4};
  const map={gold:{background:"var(--gold)",color:"#000",border:"none"},green:{background:"var(--green)",color:"#fff",border:"none"},red:{background:"var(--red)",color:"#fff",border:"none"},blue:{background:"var(--blue)",color:"#fff",border:"none"},outline:{background:"transparent",color:"var(--gold)",border:"1px solid var(--gold)"},ghost:{background:"transparent",color:"var(--muted)",border:"1px solid var(--border)"}};
  return{...base,...(map[v]||map.ghost)};
}
function inputStyle(extra={}){
  return{width:"100%",background:"#0d0d0d",border:"1px solid var(--border)",color:"var(--text)",padding:"9px 11px",fontSize:15,fontFamily:"inherit",outline:"none",borderRadius:3,boxSizing:"border-box",resize:"vertical",...extra};
}
function cardStyle(){return{background:"var(--card)",border:"1px solid var(--border)",padding:14,marginBottom:10,borderRadius:4};}
function selBtnStyle(active,col){
  const c=col||"var(--gold)";
  return{fontWeight:700,fontSize:11,letterSpacing:.5,padding:"7px 12px",border:`1.5px solid ${active?c:"var(--border)"}`,background:active?`${c}20`:"transparent",color:active?c:"var(--muted)",cursor:"pointer",borderRadius:3,whiteSpace:"nowrap"};
}
function circleStyle(done,col){
  const c=col||"var(--green)";
  return{width:34,height:34,borderRadius:"50%",border:`2px solid ${done?c:"var(--border)"}`,background:done?c:"#0d0d0d",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:15,flexShrink:0,color:done?"#fff":"var(--muted)",transition:"all .15s"};
}
function labelStyle(){return{display:"block",fontSize:10,fontWeight:600,letterSpacing:1,textTransform:"uppercase",color:"var(--muted)",marginBottom:4};}
function tagStyle(col){return{fontSize:9,padding:"2px 7px",background:col?`${col}22`:"var(--gold-dim)",color:col||"var(--gold)",fontWeight:700,letterSpacing:1,borderRadius:2};}
function variantCardStyle(sel){return{border:`1.5px solid ${sel?"var(--gold)":"#3a3a3a"}`,background:sel?"var(--gold-dim)":"#1e1e1e",padding:"11px 13px",borderRadius:3,cursor:"pointer",marginBottom:8};}

          {VARIANTS.map(v=><div key={v.id} style={variantCardStyle(variant===v.id)} onClick={()=>setVariant(v.id)}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${variant===v.id?"var(--gold)":"#555"}`,background:variant===v.id?"var(--gold)":"transparent",flexShrink:0}}/>

            <div style={{display:"flex",alignItems:"center",gap:8}}>

          </div>

        {step===3&&<div style={cardStyle()}>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {LIFTS.map(l=><div key={l}>

          {Object.keys(inp).some(k=>inp[k])&&<div style={{paddingTop:12,borderTop:"1px solid var(--border)",marginBottom:12}}>

              {LIFTS.filter(l=>inp[l]).map(l=>{

                const tm=rndW(fromDisp(raw,unit)*0.9,unit);
                return<div key={l} style={{background:"#0d0d0d",border:"1px solid var(--border)",padding:"10px 8px",textAlign:"center",flex:"1 1 60px",borderRadius:3}}>
                  <div style={{fontWeight:900,fontSize:22,color:"var(--gold)",lineHeight:1}}>{tm}</div>
                  <div style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginTop:3}}>{LIFT_LABELS[l]}</div>
                </div>;
              })}
            </div>
          </div>}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            <button style={btnStyle("ghost")} onClick={()=>setStep(2)}>← Back</button>
            <button style={btnStyle("gold")} onClick={finish}>Start Training →</button>
          </div>
        </div>}
      </div>
    </div>
  );
}

// ── SETTINGS MODAL ────────────────────────────────────────────────────────────
function Settings({cfg,tms,onSave,onClose,appState}){
  const[variant,setVariant]=useState(cfg.variant);
  const[acc,setAcc]=useState(cfg.accStyle);
  const[unit,setUnit]=useState(cfg.unit);
  const[deload7,setDeload7]=useState(cfg.deloadEvery7||false);
  const[inp,setInp]=useState(Object.fromEntries(LIFTS.map(l=>[l,tms[l]?String(toDisp(tms[l],cfg.unit)):""])));
  const[customAcc,setCustomAcc]=useState(appState.customAcc||{squat:[],bench:[],deadlift:[],press:[]});
  const[customInp,setCustomInp]=useState({squat:"",bench:"",deadlift:"",press:""});
  const[warmupOn,setWarmupOn]=useState(cfg.warmup!==false);
  const[jokerOn,setJokerOn]=useState(cfg.joker||false);
  const[restSecs,setRestSecs]=useState(cfg.restSecs||180);
  const fileRef=useRef();
  const csvRef=useRef();
  const[csvMsg,setCsvMsg]=useState(null);

  function parseCSVRow(line){
    const out=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){out.push(cur.trim());cur="";}
      else cur+=ch;
    }
    out.push(cur.trim());
    return out;
  }

  function normLift(name){
    const n=(name||"").toLowerCase().trim();
    if(n.includes("dead")) return "deadlift";
    if(n.includes("squat")) return "squat";
    if(n.includes("bench")) return "bench";
    if(n.includes("military")||n.includes("press")||n.includes("ohp")) return "press";
    return null;
  }

  function importCSV(e){
    const file=e.target.files[0];
    e.target.value="";
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const lines=ev.target.result.split("\n").map(l=>l.trim()).filter(l=>l);
        const parsed=lines.map(parseCSVRow);

        // Find data header row
        let dataStart=-1;
        let initRM={};
        for(let i=0;i<parsed.length;i++){
          if(parsed[i][0]==="Initial 1RM(kg)"&&parsed[i+1]){
            const v=parsed[i+1];
            initRM={deadlift:parseFloat(v[1])||0,squat:parseFloat(v[2])||0,bench:parseFloat(v[3])||0,press:parseFloat(v[4])||0};
          }
          if(parsed[i][0]==="Cycle#"){dataStart=i+1;break;}
        }
        if(dataStart<0) throw new Error("Could not find Cycle# header row — is this a Sarasoft export?");

        const history=[];
        const prs={squat:[],bench:[],deadlift:[],press:[]};
        const latestTM={};
        let maxCycle=1,maxWeek=1,totalW=0;

        for(let i=dataStart;i<parsed.length;i++){
          const row=parsed[i];
          if(!row[0]||isNaN(parseInt(row[0]))) continue;
          const cycle=parseInt(row[0]);
          const week=parseInt(row[1]);
          const lift=normLift(row[2]);
          const tm=parseFloat(row[3])||0;
          const actual=parseFloat(row[4])||0;
          const date=(row[5]||"").replace(/"/g,"").trim();
          const notes=(row[6]||"").replace(/"/g,"").trim().replace(/^\s+$/,"");
          if(!lift) continue;

          if(cycle>maxCycle||(cycle===maxCycle&&week>maxWeek)){maxCycle=cycle;maxWeek=week;}
          totalW=Math.max(totalW,(cycle-1)*4+week);
          if(tm>0) latestTM[lift]=tm;

          // Set 3 = AMRAP: row[12]=reps, row[13]=weight
          const amrapReps=parseInt(row[12])||0;
          const amrapWt=parseFloat(row[13])||0;
          const est=(amrapReps>0&&amrapWt>0)?(amrapReps===1?amrapWt:Math.round(amrapWt*(1+amrapReps/30))):null;
          if(est) prs[lift].push({cycle,week,est,date});

          history.push({
            id:Date.now()+i,
            date,cycle,week,
            day:LIFTS.indexOf(lift),
            lift:LIFT_LABELS[lift],
            topSet:(amrapWt||actual)+"kg",
            amrap:amrapReps||"—",
            notes:notes||"",
          });
        }

        if(!history.length) throw new Error("No workout rows found in file");

        // TMs: use stored TM directly (already at 90%)
        const newTMs={};
        LIFTS.forEach(l=>{if(latestTM[l])newTMs[l]=r5(latestTM[l]);});

        const nextWeek=maxWeek>=4?1:maxWeek+1;
        const nextCycle=maxWeek>=4?maxCycle+1:maxCycle;

        onSave({
          _csvImport:true,
          variant:cfg.variant,accStyle:cfg.accStyle,unit:"kg",
          deloadEvery7:cfg.deloadEvery7,warmup:cfg.warmup!==false,
          joker:cfg.joker||false,restSecs:cfg.restSecs||180,
          tms:newTMs,
          customAcc:appState.customAcc||{squat:[],bench:[],deadlift:[],press:[]},
          history:[...history].reverse(),
          prs,
          week:nextWeek,cycle:nextCycle,day:0,totalWeeks:totalW,
        });

        setCsvMsg({ok:true,text:`✓ Imported ${history.length} sessions across ${maxCycle} cycles. Ready to go.`});
        setTimeout(()=>{setCsvMsg(null);onClose();},2000);
      }catch(err){
        setCsvMsg({ok:false,text:"Import failed: "+err.message});
      }
    };
    reader.readAsText(file);
  }

  function save(){
    const newTms={};
    LIFTS.forEach(l=>{const v=parseFloat(inp[l]);if(!isNaN(v)&&v>0)newTms[l]=rndW(fromDisp(v,unit)*0.9,"kg");});
    onSave({variant,accStyle:acc,unit,deloadEvery7:deload7,warmup:warmupOn,joker:jokerOn,restSecs,tms:newTms,customAcc});
    onClose();
  }

  function exportJSON(){
    const blob=new Blob([JSON.stringify(appState,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="531plus_backup.json";a.click();
  }

  function importJSON(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);onSave(d,true);onClose();alert("Imported successfully!");}catch{alert("Invalid backup file.");}};
    reader.readAsText(file);
  }

  function saveGDrive(){
    const data=JSON.stringify(appState,null,2);
    const encoded=encodeURIComponent(data);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    // Open Google Drive upload — user picks the file
    window.open("https://drive.google.com/drive/my-drive","_blank");
    // Also trigger download so they have the file ready to upload
    const a=document.createElement("a");a.href=url;a.download="531plus_backup.json";a.click();
    alert("File downloaded. Now upload it to the Google Drive tab that just opened.");
  }

  const radStyle=(sel)=>({width:12,height:12,borderRadius:"50%",border:`2px solid ${sel?"var(--gold)":"#555"}`,background:sel?"var(--gold)":"transparent",flexShrink:0});

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:300,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      <div style={{maxWidth:500,margin:"0 auto",padding:"12px 12px 60px"}}>
        <div style={{...cardStyle(),marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:15,textTransform:"uppercase",letterSpacing:.5}}>Settings</div>
            <button style={btnStyle("ghost","sm")} onClick={onClose}>✕ Close</button>
          </div>

          <div style={{marginBottom:16}}>
            <label style={labelStyle()}>Program Variant</label>
            {VARIANTS.map(v=><div key={v.id} style={{...variantCardStyle(variant===v.id),marginBottom:5}} onClick={()=>setVariant(v.id)}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={radStyle(variant===v.id)}/>
                <div><div style={{fontWeight:700,fontSize:12,color:"#ddd"}}>{v.name}</div><div style={{color:"#999",fontSize:11,marginTop:1}}>{v.desc}</div></div>
              </div>
            </div>)}
          </div>

          <div style={{marginBottom:16}}>
            <label style={labelStyle()}>Accessories</label>
            {ACC_STYLES.map(a=><div key={a.id} style={{...variantCardStyle(acc===a.id),marginBottom:5}} onClick={()=>setAcc(a.id)}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={radStyle(acc===a.id)}/>
                <div><div style={{fontWeight:700,fontSize:12,color:"#ddd"}}>{a.name}</div><div style={{color:"#999",fontSize:11,marginTop:1}}>{a.desc}</div></div>
              </div>
            </div>)}
          </div>

          {acc==="custom"&&<div style={{marginBottom:16}}>
            <label style={labelStyle()}>Custom Accessories per Day</label>
            {LIFTS.map(lift=><div key={lift} style={{marginBottom:12}}>
              <div style={{fontWeight:600,fontSize:11,color:"var(--gold)",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>{LIFT_LABELS[lift]} Day</div>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <input style={{...inputStyle(),flex:1,fontSize:13,padding:"7px 9px"}} placeholder="e.g. Pull-ups 3×10" value={customInp[lift]||""} onChange={e=>setCustomInp(p=>({...p,[lift]:e.target.value}))}/>
                <button style={btnStyle("gold","sm")} onClick={()=>{
                  const v=(customInp[lift]||"").trim();
                  if(!v)return;
                  setCustomAcc(p=>({...p,[lift]:[...p[lift],v]}));
                  setCustomInp(p=>({...p,[lift]:""}));
                }}>Add</button>
              </div>
              {customAcc[lift].map((ex,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0d0d0d",border:"1px solid var(--border)",padding:"6px 10px",borderRadius:3,marginBottom:4}}>
                <span style={{fontSize:12,color:"var(--text)"}}>{ex}</span>
                <button style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:14,padding:"0 4px"}} onClick={()=>setCustomAcc(p=>({...p,[lift]:p[lift].filter((_,j)=>j!==i)}))}>✕</button>
              </div>)}
            </div>)}
          </div>}

          <div style={{marginBottom:16}}>
            <label style={labelStyle()}>Options</label>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[["warmup","Warm-up sets (40/50/60%)"],["joker","Joker sets after AMRAP"]].map(([k,lbl])=>{
                const on=k==="warmup"?deload7||true:false; // use local state below
                return null; // handled separately
              })}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <label style={{...labelStyle(),marginBottom:2}}>Warm-up sets</label>
                <div style={{display:"flex",gap:6}}>
                  <button style={selBtnStyle(warmupOn,"var(--green)")} onClick={()=>setWarmupOn(true)}>On</button>
                  <button style={selBtnStyle(!warmupOn)} onClick={()=>setWarmupOn(false)}>Off</button>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <label style={{...labelStyle(),marginBottom:2}}>Joker sets</label>
                <div style={{display:"flex",gap:6}}>
                  <button style={selBtnStyle(jokerOn,"var(--purple)")} onClick={()=>setJokerOn(true)}>On</button>

              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <label style={{...labelStyle(),marginBottom:2}}>Rest timer (seconds)</label>
                <input style={{...inputStyle(),maxWidth:100}} type="number" inputMode="numeric" value={restSecs} onChange={e=>setRestSecs(parseInt(e.target.value)||180)}/>

            </div>
          </div>

          <div style={{marginBottom:16}}>
            <label style={labelStyle()}>Units</label>
            <div style={{display:"flex",gap:6}}>{["kg","lbs"].map(u=><button key={u} style={selBtnStyle(unit===u)} onClick={()=>setUnit(u)}>{u}</button>)}</div>

          <div style={{marginBottom:16}}>
            <div style={{border:"1px solid var(--border)",borderRadius:3,padding:"11px 12px",cursor:"pointer",background:deload7?"var(--gold-dim)":"#1e1e1e"}} onClick={()=>setDeload7(d=>!d)}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:16,height:16,borderRadius:2,border:`2px solid ${deload7?"var(--gold)":"#555"}`,background:deload7?"var(--gold)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}>{deload7&&"✓"}</div>

                <label style={{...labelStyle(),marginBottom:3}}>{LIFT_LABELS[l]}</label>
                <input style={inputStyle()} type="number" inputMode="decimal" value={inp[l]||""} onChange={e=>setInp(p=>({...p,[l]:e.target.value}))}/>

// ── REST TIMER ────────────────────────────────────────────────────────────────
function RestTimer({secs,onClose}){
  const[left,setLeft]=useState(secs);
  const[running,setRunning]=useState(true);
  useEffect(()=>{
    if(!running||left<=0)return;
    const t=setTimeout(()=>setLeft(l=>l-1),1000);
    return()=>clearTimeout(t);
  },[left,running]);
  const pct=left/secs;
  const r=38, circ=2*Math.PI*r;
  const done=left<=0;
  return(
    <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:200,background:"#1a1a1a",border:"1px solid var(--border)",borderRadius:12,padding:"14px 20px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 4px 24px rgba(0,0,0,.7)",minWidth:220}}>
      <svg width="44" height="44" viewBox="0 0 88 88">
        <circle cx="44" cy="44" r={r} fill="none" stroke="var(--border)" strokeWidth="6"/>
        <circle cx="44" cy="44" r={r} fill="none" stroke={done?"var(--green)":"var(--gold)"} strokeWidth="6"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
          style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dashoffset .9s linear"}}/>
        <text x="44" y="50" textAnchor="middle" fontSize="18" fontWeight="700" fill={done?"var(--green)":"var(--text)"}>{done?"✓":left}</text>
      </svg>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:13,color:done?"var(--green)":"var(--text)"}}>{done?"Rest complete!":"Rest timer"}</div>
        <div style={{color:"var(--muted)",fontSize:11,marginTop:2}}>{done?"Ready for next set":"seconds remaining"}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        <button style={{...btnStyle("ghost","xs"),fontSize:12}} onClick={()=>setRunning(r=>!r)}>{running?"⏸":"▶"}</button>
        <button style={{...btnStyle("ghost","xs"),fontSize:12}} onClick={onClose}>✕</button>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const init=loadState()||DEFAULT_STATE;
  const[st,setSt]=useState(init);
  const[showSettings,setShowSettings]=useState(false);
  const[tab,setTab]=useState("workout");
  // calc tab local state
  const[calcW,setCalcW]=useState("");
  const[calcR,setCalcR]=useState("");
  const[calcRes,setCalcRes]=useState(null);
  const[bwInp,setBwInp]=useState("");
  const[timer,setTimer]=useState(null); // null | {secs}

  // Persist on every state change
  useEffect(()=>{saveState(st);},[st]);

  function upd(patch){setSt(p=>({...p,...patch}));}
  function updCfg(patch){setSt(p=>({...p,cfg:{...p.cfg,...patch}}));}

  function completeSetup(data){
    setSt(p=>({...p,setupDone:true,cfg:{variant:data.variant,accStyle:data.accStyle,unit:data.unit,deloadEvery7:data.deloadEvery7},tms:data.tms,week:1,day:0,cycle:1,totalWeeks:0,customAcc:data.customAcc||{squat:[],bench:[],deadlift:[],press:[]}}));
  }

  function saveSettings(data,isImport=false){
    if(isImport){setSt({...DEFAULT_STATE,...data});return;}
    if(data._csvImport){
      setSt(p=>({...p,
        setupDone:true,
        cfg:{...p.cfg,variant:data.variant,accStyle:data.accStyle,unit:data.unit,deloadEvery7:data.deloadEvery7,warmup:data.warmup!==false,joker:data.joker||false,restSecs:data.restSecs||180},
        tms:data.tms,
        customAcc:data.customAcc||p.customAcc,
        history:data.history||p.history,
        prs:data.prs||p.prs,
        week:data.week||p.week,
        cycle:data.cycle||p.cycle,
        day:data.day||0,
        totalWeeks:data.totalWeeks||p.totalWeeks,
      }));
      return;
    }
    setSt(p=>({...p,cfg:{variant:data.variant,accStyle:data.accStyle,unit:data.unit,deloadEvery7:data.deloadEvery7,warmup:data.warmup!==false,joker:data.joker||false,restSecs:data.restSecs||180},tms:data.tms,customAcc:data.customAcc||p.customAcc}));
  }

  function advanceWeek(){
    setSt(p=>{
      let{week,cycle,totalWeeks,tms,cfg}=p;
      const newTotal=totalWeeks+1;
      // Auto-deload every 7 weeks
      if(cfg.deloadEvery7&&newTotal%7===0&&week!==4){
        return{...p,week:4,day:0,totalWeeks:newTotal};
      }
      if(week<4){return{...p,week:week+1,day:0,totalWeeks:newTotal};}
      // End of cycle — bump TMs
      const nt={...tms};
      LIFTS.forEach(l=>{if(nt[l])nt[l]=r5(nt[l]+(l==="squat"||l==="deadlift"?5:2.5));});
      return{...p,week:1,day:0,cycle:cycle+1,tms:nt,totalWeeks:newTotal};
    });
  }

  function goBack(){
    setSt(p=>{
      let{week,cycle,day,totalWeeks}=p;
      if(day>0) return{...p,day:day-1};
      if(week>1) return{...p,week:week-1,day:3};
      if(cycle>1) return{...p,week:4,cycle:cycle-1,day:3};
      return p;
    });
  }

  function logWorkout(){
    const lift=LIFTS[st.day];
    const tm=st.tms[lift]||0;
    const ms=mainSets(st.cfg.variant,st.week);
    const topSet=ms[ms.length-1];
    const topWt=r5(tm*topSet.pct);
    const ak=`w${st.week}d${st.day}s${ms.length-1}`;
    const ar=parseInt(st.amraps[ak])||0;
    const est=ar>0?epley(topWt,ar):null;
    if(est){
      setSt(p=>({...p,prs:{...p.prs,[lift]:[...(p.prs[lift]||[]),{cycle:p.cycle,week:p.week,est,date:new Date().toLocaleDateString()}]}}));
    }
    const entry={id:Date.now(),date:new Date().toLocaleDateString(),cycle:st.cycle,week:st.week,day:st.day,lift:LIFT_LABELS[lift],topSet:toDisp(topWt,st.cfg.unit)+toLbl(st.cfg.unit),amrap:ar||"—",notes:st.notes[`w${st.week}d${st.day}`]||""};
    setSt(p=>({...p,history:[entry,...p.history]}));
    // Auto-advance day
    if(st.day<3) setSt(p=>({...p,day:p.day+1}));
  }

  function logBW(){
    const v=parseFloat(bwInp);if(isNaN(v)||v<=0)return;
    setSt(p=>({...p,bwLog:[...p.bwLog,{date:new Date().toLocaleDateString(),w:v}]}));
    setBwInp("");
  }

  const lift=LIFTS[st.day];
  const tm=st.tms[lift]||0;
  const ms=mainSets(st.cfg.variant,st.week);
  const bo=backoff(st.cfg.variant,st.week,tm);
  const wodIdx=(st.cycle-1)%3;
  const wod=WODS[lift]?.[wodIdx];
  const sk=`w${st.week}d${st.day}`;
  const curScale=st.wodScale[sk]||"rx";
  const dispTM=tm?toDisp(tm,st.cfg.unit):0;
  const varLabel=VARIANTS.find(v=>v.id===st.cfg.variant)?.name||"";

  function setCheck(k,v){
    setSt(p=>({...p,checks:{...p.checks,[k]:v}}));
    // Start rest timer when a set is ticked done
    if(v && k.includes("_done")) setTimer({secs:st.cfg.restSecs||180});
  }
  function setNote(k,v){setSt(p=>({...p,notes:{...p.notes,[k]:v}}));}
  function setAmrap(k,v){setSt(p=>({...p,amraps:{...p.amraps,[k]:v}}));}
  function setWodScale(k,v){setSt(p=>({...p,wodScale:{...p.wodScale,[k]:v}}));}
  function setExHistory(fn){setSt(p=>({...p,exHistory:fn(p.exHistory)}));}

  if(!st.setupDone) return <Wizard onComplete={completeSetup}/>;

  const TABS=[["workout","Workout"],["calc","1RM Calc"],["progress","Progress"],["history","History"]];

  return(
    <div style={{background:"#0a0a0a",minHeight:"100vh",color:"var(--text)",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif",fontSize:15}}>
      {showSettings&&<Settings cfg={st.cfg} tms={st.tms} onSave={saveSettings} onClose={()=>setShowSettings(false)} appState={st}/>}
      {timer&&<RestTimer secs={timer.secs} onClose={()=>setTimer(null)}/>}

      {/* HEADER */}
      <div style={{background:"var(--panel)",borderBottom:"2px solid var(--gold)",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,gap:8}}>
        <div style={{fontWeight:900,fontSize:20,letterSpacing:1,color:"#fff"}}>5/3/1 <span style={{color:"var(--gold)"}}>+</span></div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{background:"var(--gold)",color:"#000",fontWeight:700,fontSize:10,padding:"3px 8px",letterSpacing:1,borderRadius:2}}>C{st.cycle}·W{st.week}</div>
          <button style={{...btnStyle("ghost","sm"),padding:"5px 9px",fontSize:13,lineHeight:1,color:"var(--gold)",borderColor:"var(--gold)"}} onClick={()=>{
            setTab("workout");
            setTimeout(()=>{
              const el=document.getElementById("currentDay");
              if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.style.outline="2px solid var(--gold)";setTimeout(()=>el.style.outline="none",1200);}
            },100);
          }} title="Go to current workout">▶▶</button>
          <button style={{...btnStyle("ghost","sm"),padding:"5px 9px",fontSize:15,lineHeight:1}} onClick={()=>setShowSettings(true)} title="Settings">⚙</button>
        </div>
      </div>

      {/* Sub-badge */}
      <div style={{background:"var(--panel)",borderBottom:"1px solid var(--border)",padding:"4px 14px",fontSize:10,color:"var(--muted)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{color:"var(--gold)",fontWeight:700}}>{varLabel}</span>
        <span>·</span><span>{ACC_STYLES.find(a=>a.id===st.cfg.accStyle)?.name}</span>
        <span>·</span><span>{toLbl(st.cfg.unit)}</span>
        {st.cfg.deloadEvery7&&<><span>·</span><span style={{color:"var(--blue)"}}>Auto-deload on</span></>}
        <span style={{marginLeft:"auto",color:"var(--muted)"}}>Wk {st.totalWeeks} total</span>
      </div>

      {/* TABS */}
      <div style={{display:"flex",background:"var(--panel)",borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {TABS.map(([id,label])=><button key={id} style={{fontWeight:700,fontSize:11,letterSpacing:1.5,padding:"10px 14px",cursor:"pointer",border:"none",borderBottom:tab===id?"2px solid var(--gold)":"2px solid transparent",background:"none",color:tab===id?"var(--gold)":"var(--muted)",textTransform:"uppercase",whiteSpace:"nowrap"}} onClick={()=>setTab(id)}>{label}</button>)}
      </div>

      <div style={{padding:12,maxWidth:820,margin:"0 auto"}}>

        {/* ── WORKOUT TAB ── */}
        {tab==="workout"&&<>
          {/* Week/Day nav */}
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}>
            <button style={btnStyle("ghost","sm")} onClick={goBack}>← Back</button>
            {[1,2,3,4].map(w=><button key={w} style={selBtnStyle(st.week===w)} onClick={()=>setSt(p=>({...p,week:w,day:0}))}>{w===4?"DL":("Wk"+w)}</button>)}
            <button style={{...selBtnStyle(false),color:"var(--green)",borderColor:"var(--green)",marginLeft:"auto"}} onClick={advanceWeek}>Advance →</button>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
            {DAY_LABELS.map((d,i)=><button key={i} id={st.day===i?"currentDay":undefined} style={selBtnStyle(st.day===i)} onClick={()=>setSt(p=>({...p,day:i}))}>{d}</button>)}
          </div>

          {!tm?<div style={cardStyle()}><p style={{color:"var(--muted)",textAlign:"center",padding:20,fontSize:13}}>Open ⚙ to set training maxes.</p></div>:<>

            {/* CF PRE-LIFT (Jumps) — shown BEFORE main lift */}
            {st.cfg.accStyle==="crossfit"&&<div style={cardStyle()}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                Jumps <span style={tagStyle()}>PRE-LIFT</span>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <div><div style={{fontWeight:600,fontSize:14}}>{CF_ACC[lift].jumps.name}</div><div style={{color:"var(--muted)",fontSize:12,marginTop:3}}>{CF_ACC[lift].jumps.detail}</div></div>
                <div style={circleStyle(!!st.checks[`${sk}_jump_pre`])} onClick={()=>setCheck(`${sk}_jump_pre`,!st.checks[`${sk}_jump_pre`])}>✓</div>
              </div>
              <ExNotes exKey={`${sk}_jumps`} label={CF_ACC[lift].jumps.name} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory}/>
            </div>}

            {/* MAIN LIFT CARD */}
            <div style={cardStyle()}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                {LIFT_LABELS[lift]} — Wk{st.week}{st.week===4?" (Deload)":""}
                <span style={tagStyle()}>TM: {dispTM}{toLbl(st.cfg.unit)}</span>
                <span style={tagStyle("var(--purple)")}>{varLabel}</span>
              </div>
              {st.cfg.warmup!==false&&<div style={{marginBottom:12,paddingBottom:12,borderBottom:"1px solid var(--border)"}}>
                <div style={{fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Warm-up Sets</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {warmupSets(tm).map((wu,i)=>{
                    const dw=toDisp(wu.wt,st.cfg.unit);
                    const wuKey=`${sk}_wu${i}`,done=!!st.checks[wuKey];
                    return<div key={i} onClick={()=>setCheck(wuKey,!done)} style={{background:done?"rgba(39,174,96,.15)":"#0d0d0d",border:`1px solid ${done?"var(--green)":"var(--border)"}`,padding:"8px 10px",borderRadius:3,textAlign:"center",minWidth:62,cursor:"pointer",flex:"1",transition:"all .15s",opacity:done?.6:1}}>
                      <div style={{fontWeight:700,fontSize:16,color:done?"var(--green)":"var(--text)"}}>{dw}</div>
                      <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>{toLbl(st.cfg.unit)} × {wu.reps}</div>
                      <div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>{Math.round(wu.pct*100)}%</div>
                      {done&&<div style={{fontSize:10,color:"var(--green)",marginTop:2}}>✓</div>}
                    </div>;
                  })}
                </div>
              </div>}

              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:260}}>
                  <thead><tr>{["Set","Weight","Target","✓"].map(h=><th key={h} style={{textAlign:"left",padding:"4px 8px",fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {ms.map((set,si)=>{
                      const wt=r5(tm*set.pct);
                      const dw=toDisp(wt,st.cfg.unit);
                      const isAmrap=typeof set.reps==="string";
                      const setKey=`w${st.week}d${st.day}s${si}`;
                      const done=!!st.checks[`${setKey}_done`];
                      return<tr key={si} style={{borderBottom:"1px solid var(--border)",opacity:done?.4:1,transition:"opacity .2s"}}>
                        <td style={{padding:"9px 8px",fontWeight:700,fontSize:12}}>SET {si+1}</td>
                        <td style={{padding:"9px 8px"}}>
                          <span style={{fontWeight:900,fontSize:20,color:"var(--gold)"}}>{dw}</span>
                          <span style={{color:"var(--muted)",fontSize:11,marginLeft:3}}>{toLbl(st.cfg.unit)} · {Math.round(set.pct*100)}%</span>
                        </td>
                        <td style={{padding:"9px 8px"}}>
                          {isAmrap?<div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{color:"var(--red)",fontWeight:700,fontSize:13}}>{set.reps}</span>
                            <input style={{width:58,background:"#0d0d0d",border:"1.5px solid var(--red)",color:"var(--red)",padding:"4px 6px",fontSize:14,fontWeight:700,textAlign:"center",outline:"none",borderRadius:2,fontFamily:"inherit"}}
                              type="number" inputMode="numeric" placeholder="reps"
                              value={st.amraps[setKey]||""} onChange={e=>setAmrap(setKey,e.target.value)}/>
                          </div>:`${set.reps} reps`}
                        </td>
                        <td style={{padding:"9px 8px"}}>
                          <div style={circleStyle(done)} onClick={()=>setCheck(`${setKey}_done`,!done)}>✓</div>
                        </td>
                      </tr>;
                    })}
                  </tbody>
                </table>
              </div>

              {/* Back-off sets */}
              {bo.length>0&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
                <div style={{fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>{bo[0].label}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {bo.map((set,i)=>{
                    const wt=r5(tm*set.pct),dw=toDisp(wt,st.cfg.unit);
                    const boKey=`${sk}_bo${i}`,done=!!st.checks[boKey];
                    return<div key={i} onClick={()=>setCheck(boKey,!done)} style={{background:done?"rgba(39,174,96,.15)":"#0d0d0d",border:`1px solid ${done?"var(--green)":"var(--border)"}`,padding:"7px 10px",borderRadius:3,textAlign:"center",minWidth:58,cursor:"pointer",transition:"all .15s",opacity:done?.6:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:done?"var(--green)":"var(--gold)"}}>{dw}</div>
                      <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>{toLbl(st.cfg.unit)}×{set.reps}</div>
                      {done&&<div style={{fontSize:10,color:"var(--green)",marginTop:2}}>✓</div>}
                    </div>;
                  })}
                </div>
              </div>}

              {/* Joker sets */}
              {st.cfg.joker&&(()=>{
                const topSet=ms[ms.length-1];
                const jCount=st.jokerCounts[sk]||0;
                const jokers=jokerSets(tm,topSet.pct,jCount);
                return<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{fontSize:9,color:"var(--purple)",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Joker Sets</div>
                    <div style={{display:"flex",gap:5}}>
                      <button style={{...btnStyle("ghost","xs"),color:"var(--purple)",borderColor:"var(--purple)"}} onClick={()=>setSt(p=>({...p,jokerCounts:{...p.jokerCounts,[sk]:(p.jokerCounts[sk]||0)+1}}))}>+ Add Joker</button>
                      {jCount>0&&<button style={btnStyle("ghost","xs")} onClick={()=>setSt(p=>({...p,jokerCounts:{...p.jokerCounts,[sk]:p.jokerCounts[sk]-1}}))}>- Remove</button>}
                    </div>
                  </div>
                  {jokers.map((j,i)=>{
                    const dw=toDisp(j.wt,st.cfg.unit);
                    const jKey=`${sk}_joker${i}`,done=!!st.checks[jKey];
                    return<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<jokers.length-1?"1px solid var(--border)":"none",opacity:done?.5:1}}>
                      <div style={{flex:1}}>
                        <span style={{fontWeight:700,fontSize:16,color:"var(--purple)"}}>{dw}</span>
                        <span style={{color:"var(--muted)",fontSize:11,marginLeft:4}}>{toLbl(st.cfg.unit)} · {Math.round(j.pct*100)}% · {j.reps} reps</span>
                      </div>
                      <div style={circleStyle(done,"var(--purple)")} onClick={()=>setCheck(jKey,!done)}>✓</div>
                    </div>;
                  })}
                  {jCount===0&&<div style={{color:"var(--muted)",fontSize:12}}>Tap "+ Add Joker" to add sets at {Math.round((ms[ms.length-1].pct+0.05)*100)}%+</div>}
                </div>;
              })()}

              <ExNotes exKey={`${sk}_mainlift`} label={LIFT_LABELS[lift]} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory} placeholder="Weight used, feel, PRs..."/>
            </div>

            {/* CF ACCESSORIES — post-lift: sprints + WOD */}
            {st.cfg.accStyle==="crossfit"&&<>
              {/* Sprints */}
              <div style={cardStyle()}>
                <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                  Sprints <span style={tagStyle()}>POST-LIFT</span>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                  <div><div style={{fontWeight:600,fontSize:14}}>{CF_ACC[lift].sprints.name}</div><div style={{color:"var(--muted)",fontSize:12,marginTop:3}}>{CF_ACC[lift].sprints.detail}</div></div>
                  <div style={circleStyle(!!st.checks[`${sk}_sprint`])} onClick={()=>setCheck(`${sk}_sprint`,!st.checks[`${sk}_sprint`])}>✓</div>
                </div>
                <ExNotes exKey={`${sk}_sprints`} label={CF_ACC[lift].sprints.name} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory}/>
              </div>
              {/* WOD */}
              {wod&&<div style={cardStyle()}>
                <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:10,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  WOD <span style={tagStyle()}>CONDITIONING</span>
                  <span style={{...tagStyle("var(--muted)"),marginLeft:"auto"}}>{wod.name} · C{st.cycle}</span>
                </div>
                <div style={{display:"flex",gap:6,marginBottom:10}}>
                  {[["rx","Rx","var(--gold)"],["scaled","Scaled","var(--blue)"],["begin","Beginner","var(--green)"]].map(([k,lbl,col])=>
                    <button key={k} style={selBtnStyle(curScale===k,col)} onClick={()=>setWodScale(sk,k)}>{lbl}</button>)}
                </div>
                <div style={{background:"#0d0d0d",border:"1px solid var(--border)",padding:"9px 11px",borderRadius:3,fontSize:13,lineHeight:1.8,color:"var(--text)",marginBottom:8}}>{wod[curScale]}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end"}}>
                  <div style={circleStyle(!!st.checks[`${sk}_wod`])} onClick={()=>setCheck(`${sk}_wod`,!st.checks[`${sk}_wod`])}>✓</div>
                </div>
                <ExNotes exKey={`${sk}_wod`} label={wod.name} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory} placeholder="Time, rounds, load, scale..."/>
              </div>}
            </>}

            {/* WENDLER ACCESSORIES */}
            {st.cfg.accStyle==="wendler"&&<div style={cardStyle()}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>Accessories <span style={tagStyle()}>WENDLER</span></div>
              {WENDLER_ACC[lift].map((acc,i)=>{
                const ck=`${sk}_acc${i}`;
                return<div key={i} style={{paddingBottom:10,marginBottom:10,borderBottom:i<WENDLER_ACC[lift].length-1?"1px solid var(--border)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{acc.name} <span style={{color:"var(--muted)",fontWeight:400,fontSize:12}}>{acc.sets}</span></div>
                      {acc.note&&<div style={{color:"var(--muted)",fontSize:12,marginTop:2}}>{acc.note}</div>}
                    </div>
                    <div style={circleStyle(!!st.checks[ck])} onClick={()=>setCheck(ck,!st.checks[ck])}>✓</div>
                  </div>
                  <ExNotes exKey={`${sk}_wacc${i}`} label={acc.name} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory}/>
                </div>;
              })}
            </div>}

            {/* CUSTOM ACCESSORIES */}
            {st.cfg.accStyle==="custom"&&st.customAcc[lift]&&st.customAcc[lift].length>0&&<div style={cardStyle()}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>Accessories <span style={tagStyle("var(--blue)")}>CUSTOM</span></div>
              {st.customAcc[lift].map((ex,i)=>{
                const ck=`${sk}_cust${i}`;
                return<div key={i} style={{paddingBottom:10,marginBottom:10,borderBottom:i<st.customAcc[lift].length-1?"1px solid var(--border)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                    <div style={{fontWeight:600,fontSize:14}}>{ex}</div>
                    <div style={circleStyle(!!st.checks[ck])} onClick={()=>setCheck(ck,!st.checks[ck])}>✓</div>
                  </div>
                  <ExNotes exKey={`${sk}_cust${i}`} label={ex} notes={st.notes} onNoteChange={setNote} exHistory={st.exHistory} setExHistory={setExHistory}/>
                </div>;
              })}
            </div>}

            <div style={{display:"flex",justifyContent:"flex-end",marginTop:4,gap:8}}>
              <button style={btnStyle("green")} onClick={logWorkout}>✓ Log &amp; Next Day</button>
            </div>
          </>}
        </>}

        {/* ── 1RM CALC TAB ── */}
        {tab==="calc"&&<>
          <div style={cardStyle()}>
            <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>1RM Calculator</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div><label style={labelStyle()}>Weight ({toLbl(st.cfg.unit)})</label><input style={inputStyle()} type="number" inputMode="decimal" placeholder="e.g. 100" value={calcW} onChange={e=>setCalcW(e.target.value)}/></div>
              <div><label style={labelStyle()}>Reps Done</label><input style={inputStyle()} type="number" inputMode="numeric" placeholder="e.g. 5" value={calcR} onChange={e=>setCalcR(e.target.value)}/></div>
            </div>
            <button style={btnStyle("gold")} onClick={()=>{const w=parseFloat(calcW),r=parseInt(calcR);if(!isNaN(w)&&!isNaN(r)&&r>0)setCalcRes({epley:epley(w,r),brzycki:r===1?w:Math.round(w/(1.0278-.0278*r)),lander:Math.round(100*w/(101.3-2.67123*r))});}}>Calculate</button>
            {calcRes&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
              <div style={{fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Estimated 1RM</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[["Epley",calcRes.epley],["Brzycki",calcRes.brzycki],["Lander",calcRes.lander]].map(([n,v])=>
                  <div key={n} style={{background:"#0d0d0d",border:"1px solid var(--border)",padding:"10px 8px",textAlign:"center",flex:"1 1 60px",borderRadius:3}}>
                    <div style={{fontWeight:900,fontSize:22,color:"var(--gold)",lineHeight:1}}>{v}</div>
                    <div style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginTop:3}}>{n}</div>
                  </div>)}
              </div>
              <div style={{color:"var(--muted)",fontSize:12,marginTop:10}}>Suggested TM (90%): <span style={{color:"var(--gold)",fontWeight:700}}>{r5(calcRes.epley*.9)}{toLbl(st.cfg.unit)}</span></div>
            </div>}
          </div>

          <div style={cardStyle()}>
            <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>Bodyweight</div>
            <div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:12}}>
              <div style={{flex:1}}><label style={labelStyle()}>Weight ({toLbl(st.cfg.unit)})</label><input style={inputStyle()} type="number" inputMode="decimal" placeholder="e.g. 88.5" value={bwInp} onChange={e=>setBwInp(e.target.value)}/></div>
              <button style={btnStyle("gold")} onClick={logBW}>Log</button>
            </div>
            {st.bwLog.length>0&&<>
              <Chart series={[{label:"Bodyweight",color:"var(--green)",data:st.bwLog.map(b=>({x:b.date.slice(0,5),y:b.w}))}]} unit={toLbl(st.cfg.unit)}/>
              <div style={{color:"var(--muted)",fontSize:12,marginTop:6,textAlign:"right"}}>
                Latest: <span style={{color:"var(--green)",fontWeight:700}}>{st.bwLog[st.bwLog.length-1].w}{toLbl(st.cfg.unit)}</span>
                {st.bwLog.length>1&&<span style={{marginLeft:8}}>{st.bwLog[st.bwLog.length-1].w>st.bwLog[0].w?"▲":"▼"}{Math.abs(st.bwLog[st.bwLog.length-1].w-st.bwLog[0].w).toFixed(1)} total</span>}
              </div>
            </>}
          </div>
        </>}

        {/* ── PROGRESS TAB ── */}
        {tab==="progress"&&<>
          {/* Cycle overview — Target vs Actual like Sarasoft */}
          {st.history.length>0&&(()=>{
            // Group PRs by cycle
            const cycles={};
            LIFTS.forEach(l=>{
              (st.prs[l]||[]).forEach(p=>{
                if(!cycles[p.cycle])cycles[p.cycle]={};
                if(!cycles[p.cycle][l]||p.est>cycles[p.cycle][l].actual)
                  cycles[p.cycle][l]={target:toDisp(st.tms[l]||0,st.cfg.unit),actual:toDisp(p.est,st.cfg.unit)};
              });
            });
            // Also add cycles from history that have no PRs
            st.history.forEach(h=>{if(!cycles[h.cycle])cycles[h.cycle]={};});
            const cNums=Object.keys(cycles).sort((a,b)=>b-a).slice(0,6);
            if(!cNums.length) return null;
            return<div style={{marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:8,color:"var(--text)"}}>Cycle Overview</div>
              {cNums.map(cn=>{
                const cData=cycles[cn];
                const startDate=st.history.filter(h=>h.cycle==cn).map(h=>h.date).slice(-1)[0]||"";
                const endDate=st.history.filter(h=>h.cycle==cn).map(h=>h.date)[0]||"";
                return<div key={cn} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:4,padding:"11px 12px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                    <div style={{fontWeight:700,fontSize:13}}>Cycle #{cn}</div>
                    <div style={{fontSize:10,color:"var(--muted)"}}>{startDate}{endDate&&endDate!==startDate?` → ${endDate}`:""}</div>
                  </div>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr>
                      <td style={{fontSize:9,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,paddingBottom:5}}>1RM</td>
                      {LIFTS.map(l=><td key={l} style={{fontSize:9,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:1,paddingBottom:5,textAlign:"center"}}>{LIFT_LABELS[l]}</td>)}
                    </tr></thead>
                    <tbody>
                      <tr>
                        <td style={{fontSize:11,color:"var(--muted)",paddingBottom:3}}>Target</td>
                        {LIFTS.map(l=><td key={l} style={{textAlign:"center",fontWeight:600,fontSize:14,paddingBottom:3}}>{cData[l]?.target||toDisp(st.tms[l]||0,st.cfg.unit)||"—"}</td>)}
                      </tr>
                      <tr>
                        <td style={{fontSize:11,color:"var(--muted)"}}>Actual</td>
                        {LIFTS.map(l=>{
                          const t=cData[l]?.target||0,a=cData[l]?.actual||0;
                          const col=!a?"var(--muted)":a>=t?"var(--green)":"var(--red)";
                          return<td key={l} style={{textAlign:"center",fontWeight:700,fontSize:15,color:col}}>{a||"—"}</td>;
                        })}
                      </tr>
                    </tbody>
                  </table>
                </div>;
              })}
            </div>;
          })()}

          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
            {[{n:st.cycle,l:"Cycle"},{n:st.week,l:"Week"},{n:st.history.length,l:"Workouts"},{n:st.totalWeeks,l:"Total Wks"}].map(({n,l})=>
              <div key={l} style={{background:"#0d0d0d",border:"1px solid var(--border)",padding:"11px 8px",textAlign:"center",flex:"1 1 65px",borderRadius:3}}>
                <div style={{fontWeight:900,fontSize:24,color:"var(--gold)",lineHeight:1}}>{n}</div>
                <div style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginTop:3}}>{l}</div>
              </div>)}
          </div>

          <div style={cardStyle()}>
            <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              Est. 1RM Progress <span style={tagStyle()}>All Lifts</span>
              {st.bwLog.length>0&&<span style={tagStyle("var(--green)")}>+ Bodyweight</span>}
            </div>
            <Chart unit={toLbl(st.cfg.unit)} series={[
              {label:"Squat",    color:"#c9a84c",data:(st.prs.squat||[]).map(p=>({x:`C${p.cycle}W${p.week}`,y:toDisp(p.est,st.cfg.unit)}))},
              {label:"Bench",    color:"#2980b9",data:(st.prs.bench||[]).map(p=>({x:`C${p.cycle}W${p.week}`,y:toDisp(p.est,st.cfg.unit)}))},
              {label:"Deadlift", color:"#c0392b",data:(st.prs.deadlift||[]).map(p=>({x:`C${p.cycle}W${p.week}`,y:toDisp(p.est,st.cfg.unit)}))},
              {label:"OHP",      color:"#8e44ad",data:(st.prs.press||[]).map(p=>({x:`C${p.cycle}W${p.week}`,y:toDisp(p.est,st.cfg.unit)}))},
              ...(st.bwLog.length>0?[{label:"Bodyweight",color:"#27ae60",data:st.bwLog.map(b=>({x:b.date.slice(0,5),y:b.w}))}]:[]),
            ]}/>
          </div>

          <div style={cardStyle()}>
            <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Current Training Maxes</div>
            {!Object.keys(st.tms).length?<p style={{color:"var(--muted)",textAlign:"center",padding:10,fontSize:13}}>Set maxes in ⚙ Settings</p>:
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {LIFTS.filter(l=>st.tms[l]).map(l=>
                  <div key={l} style={{background:"#0d0d0d",border:"1px solid var(--border)",padding:"10px 8px",textAlign:"center",flex:"1 1 60px",borderRadius:3}}>
                    <div style={{fontWeight:900,fontSize:22,color:"var(--gold)",lineHeight:1}}>{toDisp(st.tms[l],st.cfg.unit)}</div>
                    <div style={{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginTop:3}}>{LIFT_LABELS[l]} TM</div>
                  </div>)}
              </div>}
          </div>
        </>}

        {/* ── HISTORY TAB ── */}
        {tab==="history"&&<div style={cardStyle()}>
          <div style={{fontWeight:700,fontSize:13,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>Workout Log</div>
          {!st.history.length?<p style={{color:"var(--muted)",textAlign:"center",padding:20,fontSize:13}}>No workouts logged yet.</p>:
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:340}}>
                <thead><tr>{["Date","Lift","C/Wk","Top Set","AMRAP","Notes"].map(h=><th key={h} style={{textAlign:"left",padding:"4px 8px",fontSize:9,color:"var(--muted)",fontWeight:600,letterSpacing:1,textTransform:"uppercase",borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {st.history.map(e=><tr key={e.id} style={{borderBottom:"1px solid var(--border)"}}>
                    <td style={{padding:"7px 8px",color:"var(--muted)"}}>{e.date}</td>
                    <td style={{padding:"7px 8px",fontWeight:700}}>{e.lift}</td>
                    <td style={{padding:"7px 8px",color:"var(--muted)"}}>C{e.cycle}W{e.week}</td>
                    <td style={{padding:"7px 8px",color:"var(--gold)",fontWeight:700}}>{e.topSet}</td>
                    <td style={{padding:"7px 8px"}}>{e.amrap}</td>
                    <td style={{padding:"7px 8px",color:"var(--muted)",fontSize:11,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.notes}</td>
                  </tr>)}
                </tbody>
              </table>
            </div>}
        </div>}

      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>

<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js")
      .then(r=>console.log("SW registered"))
      .catch(e=>console.log("SW failed",e));
  });
}
</script>
</body>
</html>
